<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glossary & Concept Explorer - TC Portal</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #1a1a2e;
    --bg-card: #16213e;
    --bg-hover: #1f2b47;
    --bg-panel: #0f3460;
    --teal-700: #007F7E;
    --teal-500: #43C0BE;
    --blue-700: #2C4C79;
    --text: #e0e0e0;
    --text-muted: #8892a4;
    --text-bright: #ffffff;
    --border: #2a3a5c;
    --radius: 8px;
    --mono: 'SF Mono', 'Fira Code', 'Cascadia Code', 'Menlo', 'Consolas', monospace;
    --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;

    --cat-government: #e74c3c;
    --cat-services: #007F7E;
    --cat-packages: #2C4C79;
    --cat-finance: #f39c12;
    --cat-roles: #9b59b6;
    --cat-process: #27ae60;
    --cat-compliance: #c0392b;
  }

  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.5;
  }

  /* Header */
  .header {
    background: linear-gradient(135deg, var(--bg-card) 0%, var(--bg-panel) 100%);
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header h1 {
    font-size: 18px;
    color: var(--text-bright);
    white-space: nowrap;
  }
  .header h1 span { color: var(--teal-500); }

  .header-controls {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }

  /* Search */
  .search-wrapper {
    position: relative;
    width: 320px;
  }
  .search-wrapper input {
    width: 100%;
    padding: 8px 12px 8px 36px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--bg);
    color: var(--text-bright);
    font-size: 14px;
    font-family: var(--sans);
    outline: none;
    transition: border-color 0.2s;
  }
  .search-wrapper input:focus {
    border-color: var(--teal-500);
  }
  .search-wrapper input::placeholder { color: var(--text-muted); }
  .search-icon {
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    font-size: 14px;
    pointer-events: none;
  }

  /* Toggle buttons */
  .toggle-btn {
    padding: 6px 14px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--bg);
    color: var(--text-muted);
    font-size: 12px;
    font-family: var(--sans);
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .toggle-btn:hover { border-color: var(--teal-500); color: var(--text); }
  .toggle-btn.active {
    background: var(--teal-700);
    border-color: var(--teal-700);
    color: var(--text-bright);
  }

  /* Stat counter */
  .stat-counter {
    font-size: 12px;
    color: var(--text-muted);
    white-space: nowrap;
  }
  .stat-counter strong { color: var(--teal-500); }

  /* Layout */
  .layout {
    display: flex;
    min-height: calc(100vh - 60px);
  }

  /* Alphabet sidebar */
  .alpha-sidebar {
    width: 36px;
    min-width: 36px;
    background: var(--bg-card);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 8px 0;
    gap: 1px;
    position: sticky;
    top: 60px;
    height: calc(100vh - 60px);
    overflow-y: auto;
  }
  .alpha-sidebar button {
    width: 28px;
    height: 24px;
    border: none;
    background: transparent;
    color: var(--text-muted);
    font-size: 11px;
    font-family: var(--mono);
    cursor: pointer;
    border-radius: 4px;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .alpha-sidebar button:hover { background: var(--bg-hover); color: var(--teal-500); }
  .alpha-sidebar button.has-terms { color: var(--text); font-weight: 600; }
  .alpha-sidebar button.active-letter { background: var(--teal-700); color: var(--text-bright); }

  /* Main content area */
  .main-content {
    flex: 1;
    padding: 20px 24px;
    overflow-y: auto;
    max-width: 100%;
  }

  /* Category filter bar */
  .filter-bar {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 20px;
    align-items: center;
  }
  .filter-bar .label {
    font-size: 12px;
    color: var(--text-muted);
    margin-right: 4px;
  }
  .cat-filter {
    padding: 4px 12px;
    border-radius: 20px;
    border: 1px solid;
    font-size: 12px;
    font-family: var(--sans);
    cursor: pointer;
    transition: all 0.2s;
    background: transparent;
  }
  .cat-filter.active { color: var(--text-bright); }
  .cat-filter:not(.active) { opacity: 0.4; }

  /* Term cards grid */
  .cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
    gap: 16px;
  }

  /* Letter group header */
  .letter-group {
    grid-column: 1 / -1;
    font-size: 20px;
    font-weight: 700;
    color: var(--teal-500);
    font-family: var(--mono);
    padding: 12px 0 4px;
    border-bottom: 1px solid var(--border);
    margin-top: 8px;
    scroll-margin-top: 80px;
  }

  /* Term card */
  .term-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    cursor: pointer;
    transition: all 0.25s;
    position: relative;
    overflow: hidden;
  }
  .term-card::before {
    content: '';
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 3px;
    transition: background 0.2s;
  }
  .term-card:hover {
    border-color: var(--teal-500);
    transform: translateY(-1px);
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
  }
  .term-card.highlighted {
    border-color: var(--teal-500);
    box-shadow: 0 0 0 2px rgba(67, 192, 190, 0.3), 0 4px 20px rgba(0,0,0,0.3);
    animation: pulse-highlight 1.5s ease-out;
  }
  @keyframes pulse-highlight {
    0% { box-shadow: 0 0 0 4px rgba(67, 192, 190, 0.6); }
    100% { box-shadow: 0 0 0 2px rgba(67, 192, 190, 0.3), 0 4px 20px rgba(0,0,0,0.3); }
  }

  .term-card[data-cat="government"]::before { background: var(--cat-government); }
  .term-card[data-cat="services"]::before { background: var(--cat-services); }
  .term-card[data-cat="packages"]::before { background: var(--cat-packages); }
  .term-card[data-cat="finance"]::before { background: var(--cat-finance); }
  .term-card[data-cat="roles"]::before { background: var(--cat-roles); }
  .term-card[data-cat="process"]::before { background: var(--cat-process); }
  .term-card[data-cat="compliance"]::before { background: var(--cat-compliance); }

  .card-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 8px;
  }
  .card-abbrev {
    font-size: 22px;
    font-weight: 700;
    font-family: var(--mono);
    color: var(--text-bright);
    letter-spacing: 0.5px;
    line-height: 1.2;
  }
  .card-fullname {
    font-size: 13px;
    color: var(--teal-500);
    margin-bottom: 8px;
    font-weight: 500;
  }
  .card-desc {
    font-size: 13px;
    color: var(--text);
    line-height: 1.6;
    margin-bottom: 12px;
  }
  .card-cat-tag {
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    white-space: nowrap;
    flex-shrink: 0;
  }

  /* Flashcard mode: hide description */
  .flashcard-mode .card-desc,
  .flashcard-mode .card-fullname,
  .flashcard-mode .card-meta { display: none; }
  .flashcard-mode .term-card { min-height: 80px; display: flex; align-items: center; }
  .flashcard-mode .term-card .card-header { margin-bottom: 0; }
  .flashcard-mode .term-card.revealed .card-desc,
  .flashcard-mode .term-card.revealed .card-fullname,
  .flashcard-mode .term-card.revealed .card-meta { display: block; }
  .flashcard-mode .term-card.revealed { display: block; }
  .flashcard-mode .term-card.revealed .card-header { margin-bottom: 8px; }

  /* Related terms & domain badges */
  .card-meta { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
  .related-pill {
    padding: 2px 10px;
    border-radius: 12px;
    font-size: 11px;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--teal-500);
    cursor: pointer;
    transition: all 0.2s;
    font-family: var(--mono);
  }
  .related-pill:hover {
    background: var(--teal-700);
    color: var(--text-bright);
    border-color: var(--teal-700);
  }
  .domain-badge {
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 10px;
    background: var(--blue-700);
    color: var(--text);
    border: none;
    opacity: 0.8;
  }

  /* Graph overlay */
  .graph-overlay {
    position: fixed;
    inset: 0;
    background: rgba(26, 26, 46, 0.92);
    z-index: 200;
    display: none;
    align-items: center;
    justify-content: center;
  }
  .graph-overlay.visible { display: flex; }
  .graph-container {
    width: 90vw;
    height: 80vh;
    max-width: 900px;
    max-height: 600px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    position: relative;
    overflow: hidden;
  }
  .graph-close {
    position: absolute;
    top: 12px;
    right: 12px;
    width: 32px;
    height: 32px;
    border: 1px solid var(--border);
    border-radius: 50%;
    background: var(--bg);
    color: var(--text-muted);
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10;
    transition: all 0.2s;
  }
  .graph-close:hover { color: var(--text-bright); border-color: var(--teal-500); }
  .graph-title {
    position: absolute;
    top: 12px;
    left: 16px;
    font-size: 14px;
    color: var(--text-muted);
    z-index: 10;
  }
  .graph-title strong { color: var(--teal-500); }
  canvas#graphCanvas {
    width: 100%;
    height: 100%;
  }

  /* Responsive */
  @media (max-width: 768px) {
    .header { padding: 12px 16px; }
    .search-wrapper { width: 100%; }
    .alpha-sidebar { display: none; }
    .main-content { padding: 16px; }
    .cards-grid { grid-template-columns: 1fr; }
    .header-controls { width: 100%; }
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

  /* New member badge */
  .essential-badge {
    position: absolute;
    top: 8px;
    right: 8px;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--teal-500);
    box-shadow: 0 0 6px var(--teal-500);
  }

  /* Empty state */
  .empty-state {
    grid-column: 1 / -1;
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
  }
  .empty-state .icon { font-size: 48px; margin-bottom: 16px; }
  .empty-state h3 { color: var(--text); font-size: 18px; margin-bottom: 8px; }
</style>
</head>
<body>

<div class="header">
  <h1><span>TC</span> Glossary & Concept Explorer</h1>
  <div class="header-controls">
    <div class="search-wrapper">
      <span class="search-icon">&#128269;</span>
      <input type="text" id="searchInput" placeholder="Search terms, abbreviations, descriptions..." autofocus>
    </div>
    <button class="toggle-btn" id="newModeBtn" onclick="toggleNewMode()">I'm New</button>
    <button class="toggle-btn" id="flashcardBtn" onclick="toggleFlashcard()">Flashcard</button>
    <button class="toggle-btn" id="graphBtn" onclick="openGraph(null)">Graph View</button>
    <span class="stat-counter" id="statCounter"></span>
  </div>
</div>

<div class="layout">
  <div class="alpha-sidebar" id="alphaSidebar"></div>
  <div class="main-content" id="mainContent">
    <div class="filter-bar" id="filterBar">
      <span class="label">Filter:</span>
    </div>
    <div class="cards-grid" id="cardsGrid"></div>
  </div>
</div>

<div class="graph-overlay" id="graphOverlay">
  <div class="graph-container">
    <span class="graph-title" id="graphTitle">Relationship Graph</span>
    <button class="graph-close" onclick="closeGraph()">&times;</button>
    <canvas id="graphCanvas"></canvas>
  </div>
</div>

// ============================================================
// CATEGORY DEFINITIONS
// ============================================================
const CATEGORIES = {
  government:  { label: "Government",  color: "var(--cat-government)" },
  services:    { label: "Services",    color: "var(--cat-services)" },
  packages:    { label: "Packages",    color: "var(--cat-packages)" },
  finance:     { label: "Finance",     color: "var(--cat-finance)" },
  roles:       { label: "Roles",       color: "var(--cat-roles)" },
  process:     { label: "Processes",   color: "var(--cat-process)" },
  compliance:  { label: "Compliance",  color: "var(--cat-compliance)" }
};

// ============================================================
// STATE
// ============================================================
let activeCats = new Set(Object.keys(CATEGORIES));
let searchQuery = "";
let newMode = false;
let flashcardMode = false;
let highlightedAbbrev = null;

const ESSENTIAL_TERMS = [
  "SAH", "SERG", "Care Partner", "Care Coordinator", "Service Plan",
  "Funding Stream", "NOA", "IPA", "Self-Managed", "Dignity of Risk",
  "RACI", "Epic", "Sprint", "Pennant", "Spec-Driven Development"
];

// ============================================================
// INIT
// ============================================================
document.addEventListener("DOMContentLoaded", () => {
  buildFilterBar();
  buildAlphaSidebar();
  renderCards();
  document.getElementById("searchInput").addEventListener("input", (e) => {
    searchQuery = e.target.value.trim().toLowerCase();
    renderCards();
  });
});

// ============================================================
// FILTER BAR
// ============================================================
function buildFilterBar() {
  const bar = document.getElementById("filterBar");
  bar.innerHTML = '<span class="label">Filter:</span>';
  for (const [key, cat] of Object.entries(CATEGORIES)) {
    const btn = document.createElement("button");
    btn.className = "cat-filter active";
    btn.textContent = cat.label;
    btn.style.borderColor = cat.color;
    btn.style.color = cat.color;
    btn.dataset.cat = key;
    btn.addEventListener("click", () => {
      if (activeCats.has(key)) {
        activeCats.delete(key);
        btn.classList.remove("active");
      } else {
        activeCats.add(key);
        btn.classList.add("active");
      }
      renderCards();
    });
    bar.appendChild(btn);
  }
}

// ============================================================
// ALPHABET SIDEBAR
// ============================================================
function buildAlphaSidebar() {
  const sidebar = document.getElementById("alphaSidebar");
  const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");
  const usedLetters = new Set(GLOSSARY.map(t => t.abbrev.charAt(0).toUpperCase()));

  for (const letter of letters) {
    const btn = document.createElement("button");
    btn.textContent = letter;
    if (usedLetters.has(letter)) btn.classList.add("has-terms");
    btn.addEventListener("click", () => {
      const el = document.getElementById("letter-" + letter);
      if (el) {
        el.scrollIntoView({ behavior: "smooth", block: "start" });
        document.querySelectorAll(".alpha-sidebar button").forEach(b => b.classList.remove("active-letter"));
        btn.classList.add("active-letter");
      }
    });
    sidebar.appendChild(btn);
  }
}

// ============================================================
// RENDER CARDS
// ============================================================
function renderCards() {
  const grid = document.getElementById("cardsGrid");
  grid.innerHTML = "";

  const mainContent = document.getElementById("mainContent");
  if (flashcardMode) {
    mainContent.classList.add("flashcard-mode");
  } else {
    mainContent.classList.remove("flashcard-mode");
  }

  let filtered = GLOSSARY.filter(t => {
    if (!activeCats.has(t.cat)) return false;
    if (newMode && !t.essential) return false;
    if (searchQuery) {
      const haystack = (t.abbrev + " " + t.fullName + " " + t.desc).toLowerCase();
      return haystack.includes(searchQuery);
    }
    return true;
  });

  // Sort alphabetically by abbreviation
  filtered.sort((a, b) => a.abbrev.localeCompare(b.abbrev));

  // Update stat counter
  document.getElementById("statCounter").innerHTML =
    `<strong>${filtered.length}</strong> / ${GLOSSARY.length} terms`;

  if (filtered.length === 0) {
    grid.innerHTML = `
      <div class="empty-state">
        <div class="icon">&#128218;</div>
        <h3>No terms found</h3>
        <p>Try adjusting your search or filters.</p>
      </div>`;
    return;
  }

  // Group by first letter
  let currentLetter = "";
  for (const term of filtered) {
    const firstLetter = term.abbrev.charAt(0).toUpperCase();
    if (firstLetter !== currentLetter) {
      currentLetter = firstLetter;
      const letterHeader = document.createElement("div");
      letterHeader.className = "letter-group";
      letterHeader.id = "letter-" + currentLetter;
      letterHeader.textContent = currentLetter;
      grid.appendChild(letterHeader);
    }
    grid.appendChild(createCard(term));
  }

  // Highlight if needed
  if (highlightedAbbrev) {
    requestAnimationFrame(() => {
      const card = document.querySelector(`.term-card[data-abbrev="${highlightedAbbrev}"]`);
      if (card) {
        card.classList.add("highlighted");
        card.scrollIntoView({ behavior: "smooth", block: "center" });
        setTimeout(() => { highlightedAbbrev = null; }, 2000);
      }
    });
  }
}

function createCard(term) {
  const card = document.createElement("div");
  card.className = "term-card";
  card.dataset.cat = term.cat;
  card.dataset.abbrev = term.abbrev;

  if (flashcardMode) {
    card.addEventListener("click", (e) => {
      if (e.target.classList.contains("related-pill")) return;
      card.classList.toggle("revealed");
    });
  }

  const catInfo = CATEGORIES[term.cat];
  const catTag = `<span class="card-cat-tag" style="background:${catInfo.color}22;color:${catInfo.color};border:1px solid ${catInfo.color}44;">${catInfo.label}</span>`;
  const essentialDot = (term.essential && newMode) ? '<span class="essential-badge"></span>' : '';

  // Related pills
  let relatedHTML = "";
  if (term.related && term.related.length > 0) {
    relatedHTML = term.related.map(r =>
      `<button class="related-pill" onclick="navigateToTerm('${r.replace(/'/g, "\\'")}')" title="Go to ${r}">${r}</button>`
    ).join("");
  }

  // Domain badges
  let domainsHTML = "";
  if (term.domains && term.domains.length > 0) {
    domainsHTML = term.domains.map(d =>
      `<span class="domain-badge">${d}</span>`
    ).join("");
  }

  // Graph button
  const graphBtnHTML = (term.related && term.related.length > 0)
    ? `<button class="related-pill" onclick="event.stopPropagation(); openGraph('${term.abbrev.replace(/'/g, "\\'")}')" title="View relationships" style="border-color:var(--teal-700);color:var(--teal-700);">&#9878; graph</button>`
    : "";

  card.innerHTML = `
    ${essentialDot}
    <div class="card-header">
      <span class="card-abbrev">${term.abbrev}</span>
      ${catTag}
    </div>
    <div class="card-fullname">${term.fullName}</div>
    <div class="card-desc">${term.desc}</div>
    <div class="card-meta">
      ${relatedHTML}
      ${graphBtnHTML}
      ${domainsHTML}
    </div>
  `;

  return card;
}

// ============================================================
// NAVIGATION
// ============================================================
function navigateToTerm(abbrev) {
  // Reset filters to show the term
  const term = GLOSSARY.find(t => t.abbrev === abbrev);
  if (term) {
    if (!activeCats.has(term.cat)) {
      activeCats.add(term.cat);
      const btn = document.querySelector(`.cat-filter[data-cat="${term.cat}"]`);
      if (btn) btn.classList.add("active");
    }
    if (newMode && !term.essential) {
      newMode = false;
      document.getElementById("newModeBtn").classList.remove("active");
    }
  }

  // Clear search if it would hide the term
  const haystack = term ? (term.abbrev + " " + term.fullName + " " + term.desc).toLowerCase() : "";
  if (searchQuery && !haystack.includes(searchQuery)) {
    searchQuery = "";
    document.getElementById("searchInput").value = "";
  }

  highlightedAbbrev = abbrev;
  renderCards();
}

// ============================================================
// TOGGLES
// ============================================================
function toggleNewMode() {
  newMode = !newMode;
  document.getElementById("newModeBtn").classList.toggle("active", newMode);
  renderCards();
}

function toggleFlashcard() {
  flashcardMode = !flashcardMode;
  document.getElementById("flashcardBtn").classList.toggle("active", flashcardMode);
  renderCards();
}

// ============================================================
// FORCE-DIRECTED GRAPH
// ============================================================
let graphAnimFrame = null;

function openGraph(centerAbbrev) {
  const overlay = document.getElementById("graphOverlay");
  overlay.classList.add("visible");

  const canvas = document.getElementById("graphCanvas");
  const ctx = canvas.getContext("2d");
  const container = canvas.parentElement;

  // High DPI
  const dpr = window.devicePixelRatio || 1;
  const rect = container.getBoundingClientRect();
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  canvas.style.width = rect.width + "px";
  canvas.style.height = rect.height + "px";
  ctx.scale(dpr, dpr);

  const W = rect.width;
  const H = rect.height;

  // Build graph data
  let nodes = [];
  let edges = [];
  let nodeMap = {};

  // Determine which terms to show
  let termsToShow;
  if (centerAbbrev) {
    const centerTerm = GLOSSARY.find(t => t.abbrev === centerAbbrev);
    if (!centerTerm) { closeGraph(); return; }
    const relatedSet = new Set(centerTerm.related || []);
    relatedSet.add(centerAbbrev);

    // Also include second-degree relations
    for (const r of centerTerm.related || []) {
      const rt = GLOSSARY.find(t => t.abbrev === r);
      if (rt) {
        for (const rr of rt.related || []) {
          relatedSet.add(rr);
        }
      }
    }

    termsToShow = GLOSSARY.filter(t => relatedSet.has(t.abbrev));
    document.getElementById("graphTitle").innerHTML = `Relationships: <strong>${centerAbbrev}</strong>`;
  } else {
    termsToShow = GLOSSARY;
    document.getElementById("graphTitle").innerHTML = "Full Relationship Graph";
  }

  // Create nodes
  for (let i = 0; i < termsToShow.length; i++) {
    const t = termsToShow[i];
    const angle = (2 * Math.PI * i) / termsToShow.length;
    const radius = Math.min(W, H) * 0.35;
    nodes.push({
      id: t.abbrev,
      x: W / 2 + radius * Math.cos(angle) + (Math.random() - 0.5) * 30,
      y: H / 2 + radius * Math.sin(angle) + (Math.random() - 0.5) * 30,
      vx: 0,
      vy: 0,
      cat: t.cat,
      isCenter: t.abbrev === centerAbbrev
    });
    nodeMap[t.abbrev] = nodes.length - 1;
  }

  // Create edges
  for (const t of termsToShow) {
    for (const r of t.related || []) {
      if (nodeMap[r] !== undefined && nodeMap[t.abbrev] !== undefined) {
        const a = Math.min(nodeMap[t.abbrev], nodeMap[r]);
        const b = Math.max(nodeMap[t.abbrev], nodeMap[r]);
        const edgeKey = a + "-" + b;
        if (!edges.find(e => e.key === edgeKey)) {
          edges.push({ source: a, target: b, key: edgeKey });
        }
      }
    }
  }

  // Simulation parameters
  const SIM_STEPS = 200;
  let step = 0;

  function simulate() {
    // Repulsion
    for (let i = 0; i < nodes.length; i++) {
      for (let j = i + 1; j < nodes.length; j++) {
        let dx = nodes[j].x - nodes[i].x;
        let dy = nodes[j].y - nodes[i].y;
        let dist = Math.sqrt(dx * dx + dy * dy) || 1;
        let force = 3000 / (dist * dist);
        let fx = (dx / dist) * force;
        let fy = (dy / dist) * force;
        nodes[i].vx -= fx;
        nodes[i].vy -= fy;
        nodes[j].vx += fx;
        nodes[j].vy += fy;
      }
    }

    // Attraction along edges
    for (const edge of edges) {
      const s = nodes[edge.source];
      const t = nodes[edge.target];
      let dx = t.x - s.x;
      let dy = t.y - s.y;
      let dist = Math.sqrt(dx * dx + dy * dy) || 1;
      let force = (dist - 100) * 0.02;
      let fx = (dx / dist) * force;
      let fy = (dy / dist) * force;
      s.vx += fx;
      s.vy += fy;
      t.vx -= fx;
      t.vy -= fy;
    }

    // Center gravity
    for (const n of nodes) {
      n.vx += (W / 2 - n.x) * 0.001;
      n.vy += (H / 2 - n.y) * 0.001;
    }

    // Update positions with damping
    const damping = 0.85;
    for (const n of nodes) {
      n.vx *= damping;
      n.vy *= damping;
      n.x += n.vx;
      n.y += n.vy;
      // Keep in bounds
      n.x = Math.max(40, Math.min(W - 40, n.x));
      n.y = Math.max(50, Math.min(H - 20, n.y));
    }
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);

    // Draw edges
    ctx.lineWidth = 1;
    ctx.strokeStyle = "rgba(42, 58, 92, 0.6)";
    for (const edge of edges) {
      const s = nodes[edge.source];
      const t = nodes[edge.target];
      ctx.beginPath();
      ctx.moveTo(s.x, s.y);
      ctx.lineTo(t.x, t.y);
      ctx.stroke();
    }

    // Draw nodes
    for (const n of nodes) {
      const catColor = CATEGORIES[n.cat] ? CATEGORIES[n.cat].color : "var(--text-muted)";
      const radius = n.isCenter ? 10 : 6;

      // Glow for center
      if (n.isCenter) {
        ctx.beginPath();
        ctx.arc(n.x, n.y, 16, 0, Math.PI * 2);
        ctx.fillStyle = "rgba(67, 192, 190, 0.15)";
        ctx.fill();
      }

      ctx.beginPath();
      ctx.arc(n.x, n.y, radius, 0, Math.PI * 2);
      ctx.fillStyle = getComputedColor(n.cat);
      ctx.fill();
      ctx.strokeStyle = "rgba(255,255,255,0.2)";
      ctx.lineWidth = 1;
      ctx.stroke();

      // Label
      ctx.fillStyle = n.isCenter ? "#ffffff" : "#c0c8d8";
      ctx.font = n.isCenter ? "bold 12px -apple-system, sans-serif" : "10px -apple-system, sans-serif";
      ctx.textAlign = "center";
      ctx.fillText(n.id, n.x, n.y - radius - 6);
    }
  }

  function getComputedColor(cat) {
    const colorMap = {
      government: "#e74c3c",
      services: "#007F7E",
      packages: "#2C4C79",
      finance: "#f39c12",
      roles: "#9b59b6",
      process: "#27ae60",
      compliance: "#c0392b"
    };
    return colorMap[cat] || "#8892a4";
  }

  function animate() {
    if (step < SIM_STEPS) {
      simulate();
      step++;
    }
    draw();
    graphAnimFrame = requestAnimationFrame(animate);
  }

  // Cancel any previous animation
  if (graphAnimFrame) cancelAnimationFrame(graphAnimFrame);
  animate();

  // Allow clicking on graph overlay background to close
  overlay.addEventListener("click", (e) => {
    if (e.target === overlay) closeGraph();
  });
}

function closeGraph() {
  const overlay = document.getElementById("graphOverlay");
  overlay.classList.remove("visible");
  if (graphAnimFrame) {
    cancelAnimationFrame(graphAnimFrame);
    graphAnimFrame = null;
  }
}

// Keyboard shortcut: Escape to close graph
document.addEventListener("keydown", (e) => {
  if (e.key === "Escape") {
    const overlay = document.getElementById("graphOverlay");
    if (overlay.classList.contains("visible")) {
      closeGraph();
    }
  }
  // Focus search with /
  if (e.key === "/" && !["INPUT", "TEXTAREA"].includes(document.activeElement.tagName)) {
    e.preventDefault();
    document.getElementById("searchInput").focus();
  }
});
</script>
