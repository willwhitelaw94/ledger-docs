<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SD Pipeline Explorer - TC Portal</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #1a1a2e;
    --bg-card: #16213e;
    --bg-hover: #1f2b47;
    --bg-panel: #0f3460;
    --teal-700: #007F7E;
    --teal-500: #43C0BE;
    --blue-700: #2C4C79;
    --text: #e0e0e0;
    --text-muted: #8892a4;
    --text-bright: #ffffff;
    --border: #2a3a5c;
    --danger: #e74c3c;
    --warning: #f39c12;
    --gate-glow: rgba(67, 192, 190, 0.3);
    --radius: 8px;
    --mono: 'SF Mono', 'Fira Code', 'Cascadia Code', 'Menlo', 'Consolas', monospace;
    --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
  }

  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.5;
  }

  /* Header */
  .header {
    background: linear-gradient(135deg, var(--bg-card) 0%, var(--bg-panel) 100%);
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }
  .header h1 {
    font-size: 18px;
    font-weight: 700;
    color: var(--text-bright);
    letter-spacing: -0.3px;
  }
  .header h1 span { color: var(--teal-500); }
  .header-controls {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }
  .size-filter {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .size-filter label {
    font-size: 12px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .size-filter select {
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 6px 12px;
    font-size: 13px;
    font-family: var(--sans);
    cursor: pointer;
    outline: none;
  }
  .size-filter select:focus { border-color: var(--teal-500); }

  .skip-toggle {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: var(--text-muted);
    cursor: pointer;
    user-select: none;
  }
  .skip-toggle input[type="checkbox"] {
    accent-color: var(--teal-500);
    width: 16px;
    height: 16px;
  }

  /* Pipeline visualization */
  .pipeline-bar {
    background: var(--bg-card);
    border-bottom: 1px solid var(--border);
    padding: 20px 24px;
    overflow-x: auto;
  }
  .pipeline-flow {
    display: flex;
    align-items: center;
    gap: 0;
    min-width: 900px;
  }
  .pipeline-phase {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    cursor: pointer;
    position: relative;
    padding: 10px 4px;
    border-radius: var(--radius);
    transition: all 0.2s ease;
  }
  .pipeline-phase:hover { background: var(--bg-hover); }
  .pipeline-phase.active { background: rgba(0, 127, 126, 0.15); }
  .pipeline-phase.dimmed { opacity: 0.25; pointer-events: none; }
  .pipeline-phase .phase-num {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    font-weight: 700;
    color: var(--text-muted);
    border: 2px solid var(--border);
    transition: all 0.2s ease;
  }
  .pipeline-phase.active .phase-num {
    background: var(--teal-700);
    border-color: var(--teal-500);
    color: var(--text-bright);
    box-shadow: 0 0 12px var(--gate-glow);
  }
  .pipeline-phase .phase-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-muted);
    text-align: center;
    transition: color 0.2s ease;
  }
  .pipeline-phase.active .phase-label { color: var(--teal-500); }
  .pipeline-phase .linear-status {
    font-size: 9px;
    color: var(--text-muted);
    font-family: var(--mono);
    opacity: 0.6;
  }

  .pipeline-gate {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    padding: 0 2px;
    flex-shrink: 0;
  }
  .pipeline-gate .gate-diamond {
    width: 12px;
    height: 12px;
    background: var(--blue-700);
    transform: rotate(45deg);
    border: 1px solid var(--teal-500);
  }
  .pipeline-gate .gate-label {
    font-size: 8px;
    color: var(--text-muted);
    white-space: nowrap;
    font-family: var(--mono);
  }
  .pipeline-arrow {
    width: 24px;
    height: 2px;
    background: var(--border);
    flex-shrink: 0;
  }

  /* Main layout */
  .main-layout {
    display: grid;
    grid-template-columns: 220px 1fr;
    min-height: calc(100vh - 160px);
  }
  @media (max-width: 768px) {
    .main-layout { grid-template-columns: 1fr; }
    .sidebar { display: none; }
  }

  /* Sidebar */
  .sidebar {
    background: var(--bg-card);
    border-right: 1px solid var(--border);
    padding: 16px 0;
  }
  .sidebar-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 16px;
    cursor: pointer;
    transition: all 0.15s ease;
    border-left: 3px solid transparent;
  }
  .sidebar-item:hover { background: var(--bg-hover); }
  .sidebar-item.active {
    background: rgba(0, 127, 126, 0.1);
    border-left-color: var(--teal-500);
  }
  .sidebar-item.dimmed { opacity: 0.25; pointer-events: none; }
  .sidebar-item .sb-num {
    width: 24px;
    height: 24px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 700;
    background: var(--bg);
    color: var(--text-muted);
    border: 1px solid var(--border);
    flex-shrink: 0;
  }
  .sidebar-item.active .sb-num {
    background: var(--teal-700);
    border-color: var(--teal-500);
    color: var(--text-bright);
  }
  .sidebar-item .sb-text {
    font-size: 13px;
    color: var(--text-muted);
    font-weight: 500;
  }
  .sidebar-item.active .sb-text { color: var(--text-bright); }

  /* Detail panel */
  .detail-panel {
    padding: 24px;
    overflow-y: auto;
  }
  .detail-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }
  .detail-header h2 {
    font-size: 24px;
    font-weight: 700;
    color: var(--text-bright);
  }
  .detail-header h2 .gate-badge {
    font-size: 12px;
    background: var(--blue-700);
    color: var(--teal-500);
    padding: 3px 10px;
    border-radius: 12px;
    margin-left: 8px;
    font-weight: 600;
    vertical-align: middle;
  }
  .detail-meta {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
  }
  .meta-chip {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    padding: 4px 10px;
    border-radius: 12px;
    background: var(--bg-card);
    border: 1px solid var(--border);
  }
  .meta-chip .chip-label { color: var(--text-muted); }
  .meta-chip .chip-value { color: var(--teal-500); font-weight: 600; }

  .gate-question {
    background: linear-gradient(135deg, rgba(0, 127, 126, 0.1), rgba(44, 76, 121, 0.15));
    border: 1px solid rgba(67, 192, 190, 0.2);
    border-radius: var(--radius);
    padding: 16px 20px;
    margin-bottom: 24px;
    font-size: 16px;
    font-style: italic;
    color: var(--teal-500);
    line-height: 1.6;
  }
  .gate-question::before {
    content: 'Gate Question: ';
    font-style: normal;
    font-weight: 700;
    color: var(--text-muted);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    display: block;
    margin-bottom: 4px;
  }

  /* Skip warning */
  .skip-warning {
    background: rgba(231, 76, 60, 0.1);
    border: 1px solid rgba(231, 76, 60, 0.3);
    border-radius: var(--radius);
    padding: 14px 18px;
    margin-bottom: 24px;
    display: none;
  }
  .skip-warning.visible { display: block; }
  .skip-warning-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    font-weight: 700;
    color: var(--danger);
    margin-bottom: 4px;
  }
  .skip-warning-text {
    font-size: 14px;
    color: #e8a0a0;
    line-height: 1.5;
  }

  /* Sections */
  .detail-sections {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
  }
  @media (max-width: 1024px) { .detail-sections { grid-template-columns: 1fr; } }

  .section-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
  }
  .section-card.full-width { grid-column: 1 / -1; }
  .section-card h3 {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--text-muted);
    margin-bottom: 12px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }

  .skill-list { list-style: none; }
  .skill-list li {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    padding: 6px 0;
    border-bottom: 1px solid rgba(42, 58, 92, 0.5);
    font-size: 13px;
  }
  .skill-list li:last-child { border-bottom: none; }
  .skill-name {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--teal-500);
    white-space: nowrap;
    flex-shrink: 0;
  }
  .skill-desc { color: var(--text-muted); font-size: 12px; }

  .artifact-list { list-style: none; }
  .artifact-list li {
    padding: 4px 0;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text);
  }
  .artifact-list li::before {
    content: '';
    display: inline-block;
    width: 8px;
    height: 8px;
    background: var(--blue-700);
    border-radius: 2px;
    margin-right: 8px;
  }

  .check-list { list-style: none; }
  .check-list li {
    padding: 4px 0;
    font-size: 13px;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .check-list li::before {
    content: '';
    display: inline-block;
    width: 14px;
    height: 14px;
    border: 2px solid var(--teal-700);
    border-radius: 3px;
    flex-shrink: 0;
  }

  .transition-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-family: var(--mono);
    font-size: 13px;
    padding: 8px 14px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
  }
  .transition-badge .arrow {
    color: var(--teal-500);
    font-weight: 700;
  }
  .transition-badge .state {
    padding: 2px 8px;
    background: var(--blue-700);
    border-radius: 4px;
    color: var(--text-bright);
    font-size: 11px;
    font-weight: 600;
  }
  .transition-badge .state.completed {
    background: var(--teal-700);
  }

  .agent-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-family: var(--mono);
    font-size: 13px;
    padding: 6px 12px;
    background: rgba(0, 127, 126, 0.1);
    border: 1px solid rgba(67, 192, 190, 0.2);
    border-radius: var(--radius);
    color: var(--teal-500);
  }
  .agent-badge::before {
    content: '';
    width: 8px;
    height: 8px;
    background: var(--teal-500);
    border-radius: 50%;
  }

  /* Prompt output */
  .prompt-section {
    margin-top: 24px;
    padding: 24px;
    background: var(--bg-card);
    border-top: 1px solid var(--border);
  }
  .prompt-section h3 {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--text-muted);
    margin-bottom: 12px;
  }
  .prompt-box {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    font-family: var(--mono);
    font-size: 13px;
    line-height: 1.7;
    color: var(--text);
    position: relative;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .copy-btn {
    position: absolute;
    top: 8px;
    right: 8px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 4px 10px;
    font-size: 11px;
    color: var(--text-muted);
    cursor: pointer;
    font-family: var(--sans);
    transition: all 0.15s ease;
  }
  .copy-btn:hover { border-color: var(--teal-500); color: var(--teal-500); }
  .copy-btn.copied { color: var(--teal-500); border-color: var(--teal-500); }

  /* Size scaling legend */
  .size-legend {
    padding: 0 24px 16px;
    background: var(--bg-card);
    border-bottom: 1px solid var(--border);
    display: none;
  }
  .size-legend.visible { display: block; }
  .size-legend-inner {
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
    padding: 10px 14px;
    background: var(--bg);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    font-size: 12px;
    color: var(--text-muted);
  }
  .size-legend-inner strong { color: var(--teal-500); }
  .size-legend-inner .legend-item { display: flex; align-items: center; gap: 6px; }
  .legend-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
  }
  .legend-dot.active { background: var(--teal-500); }
  .legend-dot.dimmed { background: var(--border); }
</style>
</head>
<body>

<div class="header">
  <h1><span>SD</span> Pipeline Explorer</h1>
  <div class="header-controls">
    <div class="size-filter">
      <label for="sizeSelect">Feature Size</label>
      <select id="sizeSelect">
        <option value="all">All Phases</option>
        <option value="large">Large (Epic)</option>
        <option value="medium">Medium (Feature)</option>
        <option value="small">Small (Component)</option>
        <option value="trivial">Trivial (Typo Fix)</option>
      </select>
    </div>
    <label class="skip-toggle">
      <input type="checkbox" id="skipToggle"> Show "What if I skip?"
    </label>
  </div>
</div>

<div class="pipeline-bar">
  <div class="pipeline-flow" id="pipelineFlow"></div>
</div>

<div class="size-legend" id="sizeLegend">
  <div class="size-legend-inner" id="sizeLegendContent"></div>
</div>

<div class="main-layout">
  <nav class="sidebar" id="sidebar"></nav>
  <main class="detail-panel" id="detailPanel"></main>
</div>

<div class="prompt-section">
  <h3>Prompt Output</h3>
  <div class="prompt-box" id="promptBox">
    <button class="copy-btn" id="copyBtn" onclick="copyPrompt()">Copy</button>
    <span id="promptText">Select a phase to generate a context prompt.</span>
  </div>
</div>

<script>
const PHASES = [
  {
    id: 0,
    name: "Ideation",
    gate: { num: 0, label: "Idea Gate" },
    transition: { from: "Create Epic", to: "Planned" },
    linearStatus: "Planned",
    question: "Is this idea clear enough to invest in?",
    owner: "Product Owner",
    agent: "planning-agent",
    skills: [
      { name: "/trilogy-idea", desc: "Develop a raw concept into a structured idea brief" },
      { name: "/trilogy-idea-spawn", desc: "Generate new ideas from a problem space" },
      { name: "/trilogy-clarify-business", desc: "Align stakeholders on business outcomes and metrics" },
      { name: "/trilogy-raci", desc: "Define RACI matrix for the initiative" },
      { name: "/trilogy-idea-handover", desc: "Gate 0 checkpoint: create epic in Linear, move to Planned" }
    ],
    artifacts: ["idea-brief.md", "ideas-board.html"],
    validates: [
      "Problem clarity and target audience defined",
      "HOD sign-off obtained",
      "Brief is concise (1-2 pages max)",
      "Linear epic created with initiative link"
    ],
    skipConsequence: "No shared understanding of the problem. Team builds the wrong thing. Stakeholders misaligned from day one.",
    sizes: ["large", "medium"]
  },
  {
    id: 1,
    name: "Specification",
    gate: { num: 1, label: "Spec Gate" },
    transition: { from: "Planned", to: "Planned" },
    linearStatus: "Planned",
    question: "Is this spec ready for design?",
    owner: "PM / Product",
    agent: "planning-agent",
    skills: [
      { name: "/speckit-specify", desc: "Generate a full spec from idea brief with user stories and FRs" },
      { name: "/trilogy-clarify-spec", desc: "Refine spec requirements through iterative Q&A" },
      { name: "/speckit-checklist", desc: "Validate spec against INVEST criteria" },
      { name: "/trilogy-flow", desc: "Generate user flow diagrams from spec" },
      { name: "/trilogy-spec-explorer", desc: "Interactive story map with FR traceability" },
      { name: "/trilogy-spec-handover", desc: "Gate 1 checkpoint: verify spec quality and business alignment" }
    ],
    artifacts: ["spec.md"],
    validates: [
      "Spec quality meets INVEST criteria",
      "All user stories have acceptance criteria",
      "Business alignment confirmed",
      "Functional requirements are traceable",
      "Edge cases documented"
    ],
    skipConsequence: "Ambiguous requirements lead to scope creep. Developers interpret features differently. QA has nothing to test against.",
    sizes: ["large", "medium", "small"]
  },
  {
    id: 2,
    name: "Design",
    gate: { num: 2, label: "Design Gate" },
    transition: { from: "Design", to: "Dev" },
    linearStatus: "Design",
    question: "Is the design complete and ready to hand off to Dev?",
    owner: "Designer / Product",
    agent: "design-agent",
    skills: [
      { name: "/trilogy-design-kickoff", desc: "Transition from Planned to Design, create design brief" },
      { name: "/trilogy-design-research", desc: "Competitive analysis, audits, and user research" },
      { name: "/trilogy-clarify-design", desc: "Refine design requirements iteratively" },
      { name: "/trilogy-mockup", desc: "Generate HTML mockups for UI exploration" },
      { name: "/trilogy-figma-capture", desc: "Capture live pages and push to Figma" },
      { name: "/trilogy-design-gap", desc: "Identify gaps between design and spec" },
      { name: "/trilogy-design-handover", desc: "Gate 2 checkpoint: design complete, ready for dev" }
    ],
    artifacts: ["design.md", "mockups/"],
    validates: [
      "UI mockups cover all user stories",
      "User flows documented",
      "Responsive approach defined",
      "Accessibility considered",
      "Edge cases and error states designed"
    ],
    skipConsequence: "UI looks nothing like users expected. Developers make inconsistent design decisions. Accessibility and responsive gaps discovered late.",
    sizes: ["large", "medium"]
  },
  {
    id: 3,
    name: "Planning",
    gate: { num: 3, label: "Architecture Gate" },
    transition: { from: "Dev", to: "Dev" },
    linearStatus: "Dev",
    question: "Will the structure hold?",
    owner: "Architect / Developer",
    agent: "dev-agent",
    skills: [
      { name: "/speckit-plan", desc: "Generate technical plan from spec and design" },
      { name: "/trilogy-clarify-dev", desc: "Refine technical plan through Q&A" },
      { name: "/speckit-analyze", desc: "Analyze codebase for patterns and integration points" },
      { name: "/trilogy-db-visualiser", desc: "Interactive canvas DB schema scoped to epic" },
      { name: "/speckit-tasks", desc: "Break plan into implementation tasks" },
      { name: "/trilogy-linear-sync", desc: "Sync tasks to Linear issues" }
    ],
    artifacts: ["plan.md", "tasks.md"],
    validates: [
      "Architecture fits existing patterns",
      "Data model reviewed",
      "Integration points identified",
      "Migration strategy defined",
      "Task breakdown is actionable"
    ],
    skipConsequence: "Architecture doesn't fit existing patterns. Data model has issues discovered mid-implementation. Rework and refactoring waste sprint time.",
    sizes: ["large", "medium", "small"]
  },
  {
    id: 4,
    name: "Implementation",
    gate: { num: 4, label: "Code Quality Gate" },
    transition: { from: "Dev", to: "QA" },
    linearStatus: "Dev",
    question: "Is the code ready to inspect?",
    owner: "Developer",
    agent: "dev-agent",
    skills: [
      { name: "/dev-implement", desc: "Execute implementation tasks from plan" },
      { name: "/trilogy-dev-anvil", desc: "Rapid prototyping and scaffolding" },
      { name: "/trilogy-dev-review", desc: "Self-review code for quality issues" },
      { name: "/trilogy-pixel-perfect", desc: "Compare Figma design vs actual build" },
      { name: "/trilogy-dev-pr", desc: "Create pull request with proper description" },
      { name: "/trilogy-dev-handover", desc: "Gate 4 checkpoint: tests pass, coverage, all AC done" }
    ],
    artifacts: ["Code", "Tests", "PR"],
    validates: [
      "All tests pass",
      "Coverage >80%",
      "Linting clean (Pint, ESLint)",
      "Static analysis passes (Larastan)",
      "All acceptance criteria implemented",
      "No junk files committed"
    ],
    skipConsequence: "This phase cannot be skipped. No code, no feature.",
    sizes: ["large", "medium", "small", "trivial"]
  },
  {
    id: 5,
    name: "QA",
    gate: { num: 5, label: "QA Gate" },
    transition: { from: "QA", to: "Release" },
    linearStatus: "QA",
    question: "Does it actually work?",
    owner: "QA Tester",
    agent: "qa-agent",
    skills: [
      { name: "/trilogy-qa", desc: "Generate QA plan and run browser walkthrough" },
      { name: "/trilogy-qa-test-agent", desc: "Autonomous fix-and-retest loop for failing ACs" },
      { name: "/trilogy-qa-test-codify", desc: "Convert passing browser tests to Pest/Dusk tests" },
      { name: "/trilogy-qa-handover", desc: "Gate 5 checkpoint: functional, cross-browser, no Sev 1-3" }
    ],
    artifacts: ["qa-plan.md", "test-report.md"],
    validates: [
      "Functional testing passes all ACs",
      "Cross-browser testing (Chrome, Firefox, Safari)",
      "Responsive testing (mobile, tablet, desktop)",
      "Accessibility audit",
      "No Severity 1-3 bugs remaining"
    ],
    skipConsequence: "Bugs ship to production. Users encounter broken flows. Support tickets flood in. Hotfix cycle begins immediately.",
    sizes: ["large", "medium"]
  },
  {
    id: 6,
    name: "Release",
    gate: { num: 6, label: "Release Gate" },
    transition: { from: "Release", to: "Completed" },
    linearStatus: "Release",
    question: "May this enter the city?",
    owner: "PO + Stakeholders",
    agent: "release-agent",
    skills: [
      { name: "/trilogy-release-notes", desc: "Generate release notes from completed work" },
      { name: "/trilogy-ship", desc: "Execute release checklist and deploy" }
    ],
    artifacts: ["release-notes.md"],
    validates: [
      "Product owner review complete",
      "UAT sign-off obtained",
      "Feature flags configured correctly",
      "Rollback plan documented",
      "Release notes published"
    ],
    skipConsequence: "No UAT means product owner hasn't verified the feature. No rollback plan means high risk if something breaks in production.",
    sizes: ["large", "medium"]
  }
];

const SIZE_INFO = {
  trivial: { label: "Trivial (Typo Fix)", desc: "Just implement it. No ceremony needed.", phases: [4] },
  small: { label: "Small (Single Component)", desc: "Spec, Plan, then Implement.", phases: [1, 3, 4] },
  medium: { label: "Medium (Feature)", desc: "Full workflow with simplified gates.", phases: [0, 1, 2, 3, 4, 5, 6] },
  large: { label: "Large (Epic)", desc: "Full workflow, all 7 gates enforced.", phases: [0, 1, 2, 3, 4, 5, 6] },
  all: { label: "All Phases", desc: "Showing all phases regardless of size.", phases: [0, 1, 2, 3, 4, 5, 6] }
};

let selectedPhase = 0;
let selectedSize = "all";
let showSkip = false;

function getActivePhases() {
  return SIZE_INFO[selectedSize].phases;
}

function isPhaseActive(phaseId) {
  return getActivePhases().includes(phaseId);
}

function buildPipeline() {
  const flow = document.getElementById("pipelineFlow");
  flow.innerHTML = "";

  PHASES.forEach((phase, i) => {
    const phaseEl = document.createElement("div");
    phaseEl.className = "pipeline-phase" +
      (selectedPhase === i ? " active" : "") +
      (!isPhaseActive(i) ? " dimmed" : "");
    phaseEl.onclick = () => { if (isPhaseActive(i)) selectPhase(i); };
    phaseEl.innerHTML = `
      <div class="phase-num">${i + 1}</div>
      <div class="phase-label">${phase.name}</div>
      <div class="linear-status">${phase.linearStatus}</div>
    `;
    flow.appendChild(phaseEl);

    if (i < PHASES.length - 1) {
      const arrow = document.createElement("div");
      arrow.className = "pipeline-arrow";
      flow.appendChild(arrow);

      const gate = document.createElement("div");
      gate.className = "pipeline-gate";
      gate.innerHTML = `
        <div class="gate-diamond"></div>
        <div class="gate-label">G${phase.gate.num}</div>
      `;
      flow.appendChild(gate);

      const arrow2 = document.createElement("div");
      arrow2.className = "pipeline-arrow";
      flow.appendChild(arrow2);
    }
  });
}

function buildSidebar() {
  const sidebar = document.getElementById("sidebar");
  sidebar.innerHTML = "";

  PHASES.forEach((phase, i) => {
    const item = document.createElement("div");
    item.className = "sidebar-item" +
      (selectedPhase === i ? " active" : "") +
      (!isPhaseActive(i) ? " dimmed" : "");
    item.onclick = () => { if (isPhaseActive(i)) selectPhase(i); };
    item.innerHTML = `
      <div class="sb-num">${i + 1}</div>
      <div class="sb-text">${phase.name}</div>
    `;
    sidebar.appendChild(item);
  });
}

function buildDetail() {
  const panel = document.getElementById("detailPanel");
  const phase = PHASES[selectedPhase];

  const transFromClass = phase.transition.to === "Completed" ? " completed" : "";

  const skillsHtml = phase.skills.map(s =>
    `<li><span class="skill-name">${s.name}</span> <span class="skill-desc">${s.desc}</span></li>`
  ).join("");

  const artifactsHtml = phase.artifacts.map(a =>
    `<li>${a}</li>`
  ).join("");

  const validatesHtml = phase.validates.map(v =>
    `<li>${v}</li>`
  ).join("");

  panel.innerHTML = `
    <div class="detail-header">
      <div>
        <h2>${phase.name} <span class="gate-badge">Gate ${phase.gate.num}</span></h2>
      </div>
      <div class="detail-meta">
        <div class="meta-chip">
          <span class="chip-label">Owner</span>
          <span class="chip-value">${phase.owner}</span>
        </div>
        <div class="meta-chip">
          <span class="chip-label">Phase</span>
          <span class="chip-value">${phase.id + 1} of 7</span>
        </div>
      </div>
    </div>

    <div class="gate-question">${phase.question}</div>

    <div class="skip-warning ${showSkip ? 'visible' : ''}" id="skipWarning">
      <div class="skip-warning-label">What if I skip this phase?</div>
      <div class="skip-warning-text">${phase.skipConsequence}</div>
    </div>

    <div class="detail-sections">
      <div class="section-card full-width">
        <h3>Skills</h3>
        <ul class="skill-list">${skillsHtml}</ul>
      </div>

      <div class="section-card">
        <h3>Artifacts Produced</h3>
        <ul class="artifact-list">${artifactsHtml}</ul>
      </div>

      <div class="section-card">
        <h3>Gate Validates</h3>
        <ul class="check-list">${validatesHtml}</ul>
      </div>

      <div class="section-card">
        <h3>Linear Transition</h3>
        <div class="transition-badge">
          <span class="state">${phase.transition.from}</span>
          <span class="arrow">&rarr;</span>
          <span class="state${transFromClass}">${phase.transition.to}</span>
        </div>
      </div>

      <div class="section-card">
        <h3>Stage Agent</h3>
        <div class="agent-badge">${phase.agent}</div>
      </div>
    </div>
  `;
}

function buildPrompt() {
  const phase = PHASES[selectedPhase];
  const skillNames = phase.skills.map(s => s.name).join(", ");
  const handoverSkill = phase.skills[phase.skills.length - 1].name;
  const validates = phase.validates.slice(0, 3).join(", ");

  const prompt = `I'm in the ${phase.name} phase (Phase ${phase.id + 1}/7). I need to run ${skillNames}. The handover skill is ${handoverSkill} for Gate ${phase.gate.num} (${phase.gate.label}). The gate validates: ${validates}. This transitions Linear from ${phase.transition.from} to ${phase.transition.to}. The responsible owner is ${phase.owner}, orchestrated by ${phase.agent}.`;

  document.getElementById("promptText").textContent = prompt;
}

function buildSizeLegend() {
  const legend = document.getElementById("sizeLegend");
  const content = document.getElementById("sizeLegendContent");

  if (selectedSize === "all") {
    legend.classList.remove("visible");
    return;
  }

  legend.classList.add("visible");
  const info = SIZE_INFO[selectedSize];
  const items = PHASES.map((p, i) => {
    const active = info.phases.includes(i);
    return `<span class="legend-item"><span class="legend-dot ${active ? 'active' : 'dimmed'}"></span>${p.name}</span>`;
  }).join("");

  content.innerHTML = `<strong>${info.label}:</strong> ${info.desc} ${items}`;
}

function selectPhase(idx) {
  selectedPhase = idx;
  render();
}

function render() {
  buildPipeline();
  buildSidebar();
  buildDetail();
  buildPrompt();
  buildSizeLegend();
}

function copyPrompt() {
  const text = document.getElementById("promptText").textContent;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById("copyBtn");
    btn.textContent = "Copied";
    btn.classList.add("copied");
    setTimeout(() => {
      btn.textContent = "Copy";
      btn.classList.remove("copied");
    }, 2000);
  });
}

document.getElementById("sizeSelect").addEventListener("change", function () {
  selectedSize = this.value;
  const activePhases = getActivePhases();
  if (!activePhases.includes(selectedPhase)) {
    selectedPhase = activePhases[0];
  }
  render();
});

document.getElementById("skipToggle").addEventListener("change", function () {
  showSkip = this.checked;
  render();
});

// Keyboard navigation
document.addEventListener("keydown", function (e) {
  const activePhases = getActivePhases();
  const currentIndex = activePhases.indexOf(selectedPhase);

  if (e.key === "ArrowRight" || e.key === "ArrowDown") {
    e.preventDefault();
    if (currentIndex < activePhases.length - 1) {
      selectPhase(activePhases[currentIndex + 1]);
    }
  } else if (e.key === "ArrowLeft" || e.key === "ArrowUp") {
    e.preventDefault();
    if (currentIndex > 0) {
      selectPhase(activePhases[currentIndex - 1]);
    }
  }
});

// Initial render
render();
</script>
</body>
</html>
