<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invoices — GitHub Gary</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        teal: { 50: '#F0FAFA', 100: '#D5F1F0', 200: '#BAE8E7', 300: '#94DBDA', 400: '#66CCCA', 500: '#43C0BE', 600: '#2F9E9C', 700: '#007F7E', 800: '#005656', 900: '#003D3D' },
                        'primary-blue': { 50: '#F0F4FA', 100: '#D6E1F0', 200: '#BCCEE7', 300: '#96B2D9', 400: '#7197CC', 500: '#4B7BBE', 600: '#39639D', 700: '#2C4C79', 800: '#1E3452', 900: '#101C2D' }
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto+Flex:wght@300;400;500;600;700&display=swap');
        * { font-family: 'Roboto Flex', sans-serif; }
    </style>
<script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
</head>
<body class="bg-gray-50 flex">
    <!-- SIDEBAR (skeleton) -->
    <aside class="w-60 bg-white border-r border-gray-200 flex flex-col shrink-0 h-screen sticky top-0">
        <div class="px-4 py-4 border-b border-gray-100">
            <div class="flex items-center gap-2.5">
                <div class="h-8 w-8 rounded-lg bg-gray-200 animate-pulse"></div>
                <div class="h-4 w-24 rounded bg-gray-200 animate-pulse"></div>
            </div>
            <p class="mt-2 text-[9px] text-gray-300 uppercase tracking-widest text-center">Framing only</p>
        </div>
        <div class="px-3 py-3">
            <div class="h-8 rounded-lg bg-gray-100 animate-pulse"></div>
        </div>
        <nav class="flex-1 overflow-y-auto px-3 py-2 space-y-1.5">
            <div class="flex items-center gap-2.5 px-3 py-2"><div class="h-4 w-4 rounded bg-gray-200 animate-pulse"></div><div class="h-3.5 w-20 rounded bg-gray-200 animate-pulse"></div></div>
            <div class="flex items-center gap-2.5 px-3 py-2 rounded-lg bg-teal-50"><div class="h-4 w-4 rounded bg-teal-200 animate-pulse"></div><div class="h-3.5 w-18 rounded bg-teal-200 animate-pulse"></div></div>
            <div class="flex items-center gap-2.5 px-3 py-2"><div class="h-4 w-4 rounded bg-gray-200 animate-pulse"></div><div class="h-3.5 w-24 rounded bg-gray-200 animate-pulse"></div></div>
            <div class="flex items-center gap-2.5 px-3 py-2"><div class="h-4 w-4 rounded bg-gray-200 animate-pulse"></div><div class="h-3.5 w-16 rounded bg-gray-200 animate-pulse"></div></div>
            <div class="flex items-center gap-2.5 px-3 py-2"><div class="h-4 w-4 rounded bg-gray-200 animate-pulse"></div><div class="h-3.5 w-20 rounded bg-gray-200 animate-pulse"></div></div>
        </nav>
        <div class="border-t border-gray-100 px-3 py-3">
            <div class="flex items-center gap-2.5">
                <div class="h-8 w-8 rounded-full bg-gray-200 animate-pulse"></div>
                <div class="flex-1 space-y-1.5"><div class="h-3 w-24 rounded bg-gray-200 animate-pulse"></div><div class="h-2.5 w-20 rounded bg-gray-100 animate-pulse"></div></div>
            </div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col min-h-screen">
        <header class="bg-white border-b border-gray-200 px-6 py-4">
            <nav class="text-xs text-gray-400 mb-1">
                <span>Supplier Portal</span> <span class="mx-1">/</span>
                <span class="text-gray-700 font-medium">Invoices</span>
            </nav>
            <div class="flex items-center justify-between">
                <h1 class="text-xl font-semibold text-gray-900">Invoices</h1>
                <div class="flex items-center gap-3">
                    <button class="inline-flex items-center gap-2 px-3 py-2 border border-gray-200 text-sm text-gray-700 font-medium rounded-md hover:bg-gray-50 transition-colors">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/></svg>
                        Bulk Upload
                    </button>
                    <button class="inline-flex items-center gap-2 px-4 py-2 bg-teal-700 text-white text-sm font-medium rounded-md hover:bg-teal-800 transition-colors">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
                        New Invoice
                    </button>
                </div>
            </div>
        </header>

        <div class="flex-1 p-6">
            <!-- Email Banner -->
            <div class="bg-primary-blue-50 border border-primary-blue-200 rounded-lg px-4 py-3 mb-5 flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <svg class="w-5 h-5 text-primary-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
                    <div>
                        <p class="text-sm text-primary-blue-800 font-medium">Submit invoices by email</p>
                        <p class="text-xs text-primary-blue-600">Forward PDFs to <code class="font-mono bg-primary-blue-100 px-1 py-0.5 rounded">supplier-bh7x9k2m@inbound.trilogycare.com.au</code></p>
                    </div>
                </div>
                <button onclick="navigator.clipboard.writeText('supplier-bh7x9k2m@inbound.trilogycare.com.au');this.textContent='Copied!';setTimeout(()=>this.textContent='Copy',1500)" class="px-3 py-1.5 text-xs font-medium text-primary-blue-700 bg-primary-blue-100 hover:bg-primary-blue-200 rounded-md transition-colors">Copy</button>
            </div>

            <!-- Filter Tabs -->
            <div class="bg-white border border-gray-200 rounded-lg">
                <div class="border-b border-gray-200 px-4">
                    <nav class="flex gap-6 -mb-px">
                        <button class="py-3 text-sm font-medium text-teal-700 border-b-2 border-teal-700">
                            All <span class="ml-1 bg-gray-100 text-gray-600 text-xs px-1.5 py-0.5 rounded-full">142</span>
                        </button>
                        <button class="py-3 text-sm font-medium text-gray-500 hover:text-gray-700 border-b-2 border-transparent">
                            Open <span class="ml-1 bg-yellow-100 text-yellow-700 text-xs px-1.5 py-0.5 rounded-full">7</span>
                        </button>
                        <button class="py-3 text-sm font-medium text-gray-500 hover:text-gray-700 border-b-2 border-transparent">
                            On Hold <span class="ml-1 bg-orange-100 text-orange-700 text-xs px-1.5 py-0.5 rounded-full">3</span>
                        </button>
                        <button class="py-3 text-sm font-medium text-gray-500 hover:text-gray-700 border-b-2 border-transparent">
                            Closed / Paid <span class="ml-1 bg-gray-100 text-gray-600 text-xs px-1.5 py-0.5 rounded-full">132</span>
                        </button>
                    </nav>
                </div>

                <!-- Search & Filter Bar -->
                <div class="px-4 py-3 border-b border-gray-100 flex items-center gap-3">
                    <div class="flex-1 relative">
                        <svg class="w-4 h-4 text-gray-400 absolute left-3 top-1/2 -translate-y-1/2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                        <input type="text" placeholder="Search invoices by number, client, or amount..." class="w-full pl-9 pr-3 py-2 text-sm border border-gray-200 rounded-md focus:outline-none focus:ring-2 focus:ring-teal-500 focus:border-transparent">
                    </div>
                    <select class="text-sm border border-gray-200 rounded-md px-3 py-2 text-gray-600 focus:outline-none focus:ring-2 focus:ring-teal-500">
                        <option>All Sources</option>
                        <option>Email</option>
                        <option>Portal</option>
                        <option>Public</option>
                    </select>
                    <select class="text-sm border border-gray-200 rounded-md px-3 py-2 text-gray-600 focus:outline-none focus:ring-2 focus:ring-teal-500">
                        <option>Sort: Newest</option>
                        <option>Sort: Oldest</option>
                        <option>Sort: Amount (High)</option>
                        <option>Sort: Amount (Low)</option>
                    </select>
                </div>

                <!-- Batch Actions Bar (shown when items selected) -->
                <div class="px-4 py-2 bg-primary-blue-50 border-b border-primary-blue-100 flex items-center gap-3 hidden" id="batchBar">
                    <span class="text-sm text-primary-blue-700 font-medium"><span id="selectedCount">0</span> selected</span>
                    <div class="h-4 w-px bg-primary-blue-200"></div>
                    <button class="text-sm text-primary-blue-700 hover:text-primary-blue-900 font-medium">Export</button>
                    <button class="text-sm text-primary-blue-700 hover:text-primary-blue-900 font-medium">Archive</button>
                    <button class="text-sm text-red-600 hover:text-red-800 font-medium">Cancel Selection</button>
                </div>

                <!-- Invoice List -->
                <div class="divide-y divide-gray-100">
                    <!-- Row 1: Paid -->
                    <label class="px-4 py-3 flex items-center gap-3 hover:bg-gray-50 cursor-pointer group">
                        <input type="checkbox" class="h-4 w-4 rounded border-gray-300 text-teal-700 focus:ring-teal-500" onchange="updateBatch()">
                        <svg class="w-5 h-5 text-green-500 shrink-0" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/></svg>
                        <div class="flex-1 min-w-0">
                            <div class="flex items-center gap-2">
                                <span class="text-sm font-medium text-gray-900">Nursing services for Margaret Chen</span>
                                <code class="font-mono text-xs text-gray-400">#TC-4587</code>
                                <span class="text-xs px-2 py-0.5 rounded-full bg-blue-100 text-blue-700 font-medium">Email</span>
                            </div>
                            <p class="text-xs text-gray-400 mt-0.5">Opened 5 days ago &middot; Paid 2 hours ago</p>
                        </div>
                        <span class="font-mono text-sm text-gray-700">$285.00</span>
                    </label>

                    <!-- Row 2: In Review -->
                    <label class="px-4 py-3 flex items-center gap-3 hover:bg-gray-50 cursor-pointer group">
                        <input type="checkbox" class="h-4 w-4 rounded border-gray-300 text-teal-700 focus:ring-teal-500" onchange="updateBatch()">
                        <span class="flex h-5 w-5 items-center justify-center shrink-0"><span class="h-3.5 w-3.5 rounded-full bg-yellow-400"></span></span>
                        <div class="flex-1 min-w-0">
                            <div class="flex items-center gap-2">
                                <span class="text-sm font-medium text-gray-900">Physiotherapy session &mdash; Dorothy Adams</span>
                                <code class="font-mono text-xs text-gray-400">#TC-4601</code>
                                <span class="text-xs px-2 py-0.5 rounded-full bg-blue-100 text-blue-700 font-medium">Email</span>
                            </div>
                            <p class="text-xs text-gray-400 mt-0.5">Opened yesterday &middot; In review</p>
                        </div>
                        <span class="font-mono text-sm text-gray-700">$165.00</span>
                    </label>

                    <!-- Row 3: On Hold (with failing checks) -->
                    <label class="px-4 py-3 flex items-center gap-3 hover:bg-gray-50 cursor-pointer group bg-orange-50/40">
                        <input type="checkbox" class="h-4 w-4 rounded border-gray-300 text-teal-700 focus:ring-teal-500" onchange="updateBatch()">
                        <svg class="w-5 h-5 text-orange-500 shrink-0" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M8.257 3.099c.765-1.36 2.722-1.36 3.486 0l5.58 9.92c.75 1.334-.213 2.98-1.742 2.98H4.42c-1.53 0-2.493-1.646-1.743-2.98l5.58-9.92zM11 13a1 1 0 11-2 0 1 1 0 012 0zm-1-8a1 1 0 00-1 1v3a1 1 0 002 0V6a1 1 0 00-1-1z" clip-rule="evenodd"/></svg>
                        <div class="flex-1 min-w-0">
                            <div class="flex items-center gap-2">
                                <span class="text-sm font-medium text-gray-900">Home care visit &mdash; Robert Williams</span>
                                <code class="font-mono text-xs text-gray-400">#TC-4592</code>
                                <span class="text-xs px-2 py-0.5 rounded-full bg-teal-100 text-teal-700 font-medium">Portal</span>
                                <span class="inline-flex items-center gap-1 text-xs text-orange-700 bg-orange-100 px-2 py-0.5 rounded-full font-medium">
                                    <svg class="w-3 h-3" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd"/></svg>
                                    2 checks failing
                                </span>
                            </div>
                            <p class="text-xs text-gray-400 mt-0.5">Opened 3 days ago &middot; On hold</p>
                        </div>
                        <span class="font-mono text-sm text-gray-700">$420.00</span>
                    </label>

                    <!-- Row 4: Rejected -->
                    <label class="px-4 py-3 flex items-center gap-3 hover:bg-gray-50 cursor-pointer group">
                        <input type="checkbox" class="h-4 w-4 rounded border-gray-300 text-teal-700 focus:ring-teal-500" onchange="updateBatch()">
                        <svg class="w-5 h-5 text-red-500 shrink-0" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd"/></svg>
                        <div class="flex-1 min-w-0">
                            <div class="flex items-center gap-2">
                                <span class="text-sm font-medium text-gray-900">Gardening &mdash; Harold Peterson</span>
                                <code class="font-mono text-xs text-gray-400">#TC-4580</code>
                                <span class="text-xs px-2 py-0.5 rounded-full bg-purple-100 text-purple-700 font-medium">Public</span>
                                <span class="text-xs px-2 py-0.5 rounded-full bg-red-100 text-red-700 font-medium">Resubmit</span>
                            </div>
                            <p class="text-xs text-gray-400 mt-0.5">Opened 8 days ago &middot; Rejected 3 days ago</p>
                        </div>
                        <span class="font-mono text-sm text-gray-700 line-through">$190.00</span>
                    </label>

                    <!-- Row 5: In Review -->
                    <label class="px-4 py-3 flex items-center gap-3 hover:bg-gray-50 cursor-pointer group">
                        <input type="checkbox" class="h-4 w-4 rounded border-gray-300 text-teal-700 focus:ring-teal-500" onchange="updateBatch()">
                        <span class="flex h-5 w-5 items-center justify-center shrink-0"><span class="h-3.5 w-3.5 rounded-full bg-yellow-400"></span></span>
                        <div class="flex-1 min-w-0">
                            <div class="flex items-center gap-2">
                                <span class="text-sm font-medium text-gray-900">Occupational therapy &mdash; Jean Mitchell</span>
                                <code class="font-mono text-xs text-gray-400">#TC-4598</code>
                                <span class="text-xs px-2 py-0.5 rounded-full bg-blue-100 text-blue-700 font-medium">Email</span>
                            </div>
                            <p class="text-xs text-gray-400 mt-0.5">Opened 2 days ago &middot; In review</p>
                        </div>
                        <span class="font-mono text-sm text-gray-700">$310.00</span>
                    </label>

                    <!-- Row 6: On Hold (with failing checks) -->
                    <label class="px-4 py-3 flex items-center gap-3 hover:bg-gray-50 cursor-pointer group bg-orange-50/40">
                        <input type="checkbox" class="h-4 w-4 rounded border-gray-300 text-teal-700 focus:ring-teal-500" onchange="updateBatch()">
                        <svg class="w-5 h-5 text-orange-500 shrink-0" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M8.257 3.099c.765-1.36 2.722-1.36 3.486 0l5.58 9.92c.75 1.334-.213 2.98-1.742 2.98H4.42c-1.53 0-2.493-1.646-1.743-2.98l5.58-9.92zM11 13a1 1 0 11-2 0 1 1 0 012 0zm-1-8a1 1 0 00-1 1v3a1 1 0 002 0V6a1 1 0 00-1-1z" clip-rule="evenodd"/></svg>
                        <div class="flex-1 min-w-0">
                            <div class="flex items-center gap-2">
                                <span class="text-sm font-medium text-gray-900">Personal care &mdash; Alice Thompson</span>
                                <code class="font-mono text-xs text-gray-400">#TC-4595</code>
                                <span class="text-xs px-2 py-0.5 rounded-full bg-teal-100 text-teal-700 font-medium">Portal</span>
                                <span class="inline-flex items-center gap-1 text-xs text-orange-700 bg-orange-100 px-2 py-0.5 rounded-full font-medium">
                                    <svg class="w-3 h-3" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd"/></svg>
                                    1 check failing
                                </span>
                            </div>
                            <p class="text-xs text-gray-400 mt-0.5">Opened 4 days ago &middot; On hold</p>
                        </div>
                        <span class="font-mono text-sm text-gray-700">$350.00</span>
                    </label>

                    <!-- Row 7: Paid -->
                    <label class="px-4 py-3 flex items-center gap-3 hover:bg-gray-50 cursor-pointer group">
                        <input type="checkbox" class="h-4 w-4 rounded border-gray-300 text-teal-700 focus:ring-teal-500" onchange="updateBatch()">
                        <svg class="w-5 h-5 text-green-500 shrink-0" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/></svg>
                        <div class="flex-1 min-w-0">
                            <div class="flex items-center gap-2">
                                <span class="text-sm font-medium text-gray-900">Meal preparation &mdash; Frank O'Brien</span>
                                <code class="font-mono text-xs text-gray-400">#TC-4576</code>
                                <span class="text-xs px-2 py-0.5 rounded-full bg-blue-100 text-blue-700 font-medium">Email</span>
                            </div>
                            <p class="text-xs text-gray-400 mt-0.5">Opened 10 days ago &middot; Paid 6 days ago</p>
                        </div>
                        <span class="font-mono text-sm text-gray-700">$145.00</span>
                    </label>

                    <!-- Row 8: In Review -->
                    <label class="px-4 py-3 flex items-center gap-3 hover:bg-gray-50 cursor-pointer group">
                        <input type="checkbox" class="h-4 w-4 rounded border-gray-300 text-teal-700 focus:ring-teal-500" onchange="updateBatch()">
                        <span class="flex h-5 w-5 items-center justify-center shrink-0"><span class="h-3.5 w-3.5 rounded-full bg-yellow-400"></span></span>
                        <div class="flex-1 min-w-0">
                            <div class="flex items-center gap-2">
                                <span class="text-sm font-medium text-gray-900">Social support &mdash; Betty Crawford</span>
                                <code class="font-mono text-xs text-gray-400">#TC-4603</code>
                                <span class="text-xs px-2 py-0.5 rounded-full bg-teal-100 text-teal-700 font-medium">Portal</span>
                            </div>
                            <p class="text-xs text-gray-400 mt-0.5">Opened today &middot; In review</p>
                        </div>
                        <span class="font-mono text-sm text-gray-700">$220.00</span>
                    </label>
                </div>

                <!-- Pagination -->
                <div class="px-4 py-3 border-t border-gray-200 flex items-center justify-between">
                    <p class="text-xs text-gray-500">Showing 1-8 of 142 invoices</p>
                    <div class="flex items-center gap-1">
                        <button class="px-3 py-1.5 text-sm text-gray-400 border border-gray-200 rounded-md cursor-not-allowed" disabled>Previous</button>
                        <button class="px-3 py-1.5 text-sm text-teal-700 border border-teal-700 bg-teal-50 rounded-md font-medium">1</button>
                        <button class="px-3 py-1.5 text-sm text-gray-600 border border-gray-200 rounded-md hover:bg-gray-50">2</button>
                        <button class="px-3 py-1.5 text-sm text-gray-600 border border-gray-200 rounded-md hover:bg-gray-50">3</button>
                        <span class="px-2 text-gray-400">...</span>
                        <button class="px-3 py-1.5 text-sm text-gray-600 border border-gray-200 rounded-md hover:bg-gray-50">18</button>
                        <button class="px-3 py-1.5 text-sm text-gray-600 border border-gray-200 rounded-md hover:bg-gray-50">Next</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        function updateBatch() {
            const checked = document.querySelectorAll('input[type="checkbox"]:checked').length;
            const bar = document.getElementById('batchBar');
            const count = document.getElementById('selectedCount');
            if (checked > 0) {
                bar.classList.remove('hidden');
                count.textContent = checked;
            } else {
                bar.classList.add('hidden');
            }
        }
    </script>
<script src="viewer-toolbar.js" defer></script>
</body>
</html>
