<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Enhanced Bulk Actions</title><script src="https://cdn.tailwindcss.com"></script><script>tailwind.config={theme:{extend:{colors:{teal:{700:"#007F7E",500:"#43C0BE"},"primary-blue":{700:"#2C4C79"}}}}}</script><style>.tab-btn.active{background:#007F7E;color:#fff}.screen{display:none}.screen.active{display:block}</style></head><body class="bg-gray-50 min-h-screen"><nav class="bg-white border-b border-gray-200 px-4 py-2 flex items-center gap-2 text-sm flex-wrap"><span class="font-bold text-primary-blue-700">EBA</span><span class="text-gray-400">|</span><button onclick="show('table')" class="tab-btn active px-3 py-1 rounded-lg text-xs font-medium" id="btn-table">Selection</button><button onclick="show('dropdown')" class="tab-btn bg-gray-100 px-3 py-1 rounded-lg text-xs font-medium" id="btn-dropdown">Actions Menu</button><button onclick="show('tags')" class="tab-btn bg-gray-100 px-3 py-1 rounded-lg text-xs font-medium" id="btn-tags">Tag Management</button></nav><div class="flex min-h-[calc(100vh-44px)]"><aside class="w-56 bg-gray-900 text-gray-300 text-sm hidden md:block flex-shrink-0"><div class="p-4 border-b border-gray-700"><span class="text-white font-bold">TC Portal</span></div><nav class="p-2 space-y-1"><a class="block px-3 py-2 rounded-lg text-gray-400">Dashboard</a><a class="block px-3 py-2 rounded-lg bg-teal-700 text-white">Active</a><a class="block px-3 py-2 rounded-lg text-gray-400">Settings</a></nav></aside><main class="flex-1 p-6 overflow-auto"><div id="table" class="screen active"><div class="flex items-center justify-between mb-4"><h1 class="text-xl font-bold text-gray-900">Bills</h1><div class="bg-teal-50 border border-teal-200 rounded-lg px-3 py-1.5 flex items-center gap-2"><span class="text-sm font-medium text-teal-800">4 items selected</span><button class="text-xs text-teal-700 underline">Clear</button></div></div><div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden"><table class="w-full text-sm"><thead class="bg-gray-50 text-gray-500 text-xs uppercase sticky top-0"><tr><th class="px-4 py-3"><input type="checkbox" checked class="rounded"></th><th class="px-4 py-3 text-left">Invoice</th><th class="px-4 py-3 text-left">Supplier</th><th class="px-4 py-3 text-left">Amount</th><th class="px-4 py-3 text-left">Tags</th></tr></thead><tbody class="divide-y divide-gray-200"><tr class="bg-teal-50"><td class="px-4 py-3"><input type="checkbox" checked class="rounded"></td><td class="px-4 py-3 font-medium">INV-4521</td><td class="px-4 py-3">Active Body Physio</td><td class="px-4 py-3">$185.00</td><td class="px-4 py-3"><span class="bg-red-100 text-red-800 text-xs px-2 py-0.5 rounded-full">Urgent</span></td></tr><tr class="bg-teal-50"><td class="px-4 py-3"><input type="checkbox" checked class="rounded"></td><td class="px-4 py-3 font-medium">INV-4498</td><td class="px-4 py-3">Blue Cross Nursing</td><td class="px-4 py-3">$320.00</td><td class="px-4 py-3"></td></tr><tr><td class="px-4 py-3"><input type="checkbox" class="rounded"></td><td class="px-4 py-3 font-medium">INV-4455</td><td class="px-4 py-3">Aust OT Services</td><td class="px-4 py-3">$210.00</td><td class="px-4 py-3"><span class="bg-blue-100 text-blue-800 text-xs px-2 py-0.5 rounded-full">Reviewed</span></td></tr></tbody></table></div></div><div id="dropdown" class="screen"><h1 class="text-xl font-bold text-gray-900 mb-4">Bulk Actions Menu</h1><div class="max-w-xs"><div class="bg-white rounded-xl shadow-lg border p-1"><div class="px-3 py-1 text-xs font-semibold text-gray-400 uppercase">Tags</div><button class="w-full text-left px-3 py-2 hover:bg-gray-50 rounded text-sm">&#127991; Add Tags</button><button class="w-full text-left px-3 py-2 hover:bg-gray-50 rounded text-sm">&#127991; Remove Tags</button><div class="px-3 py-1 text-xs font-semibold text-gray-400 uppercase mt-1">Actions</div><button class="w-full text-left px-3 py-2 hover:bg-gray-50 rounded text-sm">&#10003; Mark Reviewed</button><button class="w-full text-left px-3 py-2 hover:bg-gray-50 rounded text-sm">&#128229; Export CSV</button><hr class="my-1"><button class="w-full text-left px-3 py-2 hover:bg-red-50 rounded text-sm text-red-600">&#128465; Delete</button></div></div></div><div id="tags" class="screen"><h1 class="text-xl font-bold text-gray-900 mb-4">Add Tags to 4 Items</h1><div class="bg-white rounded-xl shadow-sm border p-6 max-w-md"><div class="space-y-2"><label class="flex items-center gap-2 p-2 border rounded-lg cursor-pointer"><input type="checkbox" class="rounded"><span class="w-3 h-3 bg-red-500 rounded-full"></span><span class="text-sm">Urgent</span></label><label class="flex items-center gap-2 p-2 border rounded-lg cursor-pointer"><input type="checkbox" checked class="rounded text-teal-700"><span class="w-3 h-3 bg-blue-500 rounded-full"></span><span class="text-sm">Reviewed</span></label><label class="flex items-center gap-2 p-2 border rounded-lg cursor-pointer"><input type="checkbox" class="rounded"><span class="w-3 h-3 bg-green-500 rounded-full"></span><span class="text-sm">Approved</span></label></div><button class="bg-teal-700 text-white px-4 py-2 rounded-lg text-sm mt-4">Apply Tags</button></div></div></main></div><script>function show(id){document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));document.getElementById(id).classList.add("active");document.querySelectorAll(".tab-btn").forEach(b=>{b.classList.remove("active");b.classList.add("bg-gray-100")});document.getElementById("btn-"+id).classList.add("active");document.getElementById("btn-"+id).classList.remove("bg-gray-100")}</script></body></html>
