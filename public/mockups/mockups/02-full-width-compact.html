<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bill Form V3 — Variation 2: Full-Width Compact</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        teal: { 50: '#f0fdfa', 100: '#ccfbf1', 200: '#99f6e4', 300: '#5eead4', 400: '#2dd4bf', 500: '#43C0BE', 600: '#0d9488', 700: '#007F7E', 800: '#115e59', 900: '#134e4a' },
                        primary: { 700: '#2C4C79' }
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        .tabular-nums { font-variant-numeric: tabular-nums; }
        input:focus, select:focus { outline: none; }
        .cell { border: none; background: transparent; width: 100%; height: 100%; padding: 8px 10px; font-size: 13px; }
        .cell:focus { background: #f0fdfa; }
        .row:hover { background: #fafafa; }
        .row:focus-within { background: #f0fdfa; }
        /* Google Sheets-style thin borders */
        .sheet-border { border-right: 1px solid #e5e7eb; border-bottom: 1px solid #e5e7eb; }
        .sheet-border:last-child { border-right: none; }
    </style>
</head>
<body class="bg-gray-100 flex">

<!-- ===== SIDEBAR (skeleton) ===== -->
<aside class="w-60 bg-white border-r border-gray-200 flex flex-col shrink-0 h-screen sticky top-0">
    <div class="px-4 py-4 border-b border-gray-100">
        <div class="flex items-center gap-2.5">
            <div class="h-8 w-8 rounded-lg bg-gray-200 animate-pulse"></div>
            <div class="h-4 w-24 rounded bg-gray-200 animate-pulse"></div>
        </div>
        <p class="mt-2 text-[9px] text-gray-300 uppercase tracking-widest text-center">Framing only</p>
    </div>
    <div class="px-3 py-3"><div class="h-8 rounded-lg bg-gray-100 animate-pulse"></div></div>
    <nav class="flex-1 overflow-y-auto px-3 py-2 space-y-1.5">
        <div class="flex items-center gap-2.5 px-3 py-2"><div class="h-4 w-4 rounded bg-gray-200 animate-pulse"></div><div class="h-3.5 w-20 rounded bg-gray-200 animate-pulse"></div></div>
        <div class="flex items-center gap-2.5 px-3 py-2"><div class="h-4 w-4 rounded bg-gray-200 animate-pulse"></div><div class="h-3.5 w-24 rounded bg-gray-200 animate-pulse"></div></div>
        <div class="flex items-center gap-2.5 px-3 py-2 rounded-lg bg-teal-50"><div class="h-4 w-4 rounded bg-teal-200 animate-pulse"></div><div class="h-3.5 w-18 rounded bg-teal-200 animate-pulse"></div></div>
        <div class="flex items-center gap-2.5 px-3 py-2"><div class="h-4 w-4 rounded bg-gray-200 animate-pulse"></div><div class="h-3.5 w-16 rounded bg-gray-200 animate-pulse"></div></div>
    </nav>
    <div class="border-t border-gray-100 px-3 py-3">
        <div class="flex items-center gap-2.5"><div class="h-8 w-8 rounded-full bg-gray-200 animate-pulse"></div><div class="flex-1 space-y-1.5"><div class="h-3 w-24 rounded bg-gray-200 animate-pulse"></div><div class="h-2.5 w-20 rounded bg-gray-100 animate-pulse"></div></div></div>
    </div>
</aside>

<!-- ===== MAIN CONTENT ===== -->
<div class="flex-1 flex flex-col min-h-screen">

    <!-- Top bar — integrated header + invoice meta in one dense strip -->
    <div class="bg-white border-b border-gray-200">
        <!-- Row 1: Navigation + Actions -->
        <div class="px-5 py-2 flex items-center justify-between border-b border-gray-100">
            <div class="flex items-center gap-3">
                <a href="#" class="text-teal-700 hover:text-teal-800 text-sm flex items-center gap-1">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
                    Invoices
                </a>
                <span class="text-gray-300">|</span>
                <span class="text-sm font-semibold text-gray-900">New Invoice</span>
                <span class="px-1.5 py-0.5 text-[9px] font-bold tracking-wider uppercase bg-teal-100 text-teal-700 rounded">RWVGP</span>
                <span class="px-1.5 py-0.5 text-[9px] font-medium bg-amber-100 text-amber-700 rounded">Draft</span>
            </div>
            <div class="flex items-center gap-2">
                <button class="flex items-center gap-1.5 px-3 py-1.5 text-xs font-medium text-gray-500 hover:text-gray-700 border border-gray-200 rounded-md hover:bg-gray-50">
                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13"/></svg>
                    2 files
                </button>
                <button class="flex items-center gap-1.5 px-3 py-1.5 text-xs font-medium text-gray-600 border border-gray-200 rounded-md hover:bg-gray-50">
                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4"/></svg>
                    Save Draft
                </button>
                <button class="px-3 py-1.5 text-xs text-gray-400 hover:text-gray-600">Cancel</button>
                <button class="flex items-center gap-1.5 px-4 py-1.5 text-xs font-semibold text-white bg-teal-700 rounded-md hover:bg-teal-800 shadow-sm disabled:opacity-50" disabled>
                    Submit Invoice
                </button>
            </div>
        </div>

        <!-- Row 2: Invoice meta fields — all inline, no labels, just values -->
        <div class="px-5 py-2 flex items-center gap-6">
            <div class="flex items-center gap-2 flex-1 min-w-0">
                <span class="text-[10px] font-semibold text-gray-400 uppercase tracking-wider shrink-0">To</span>
                <div class="flex items-center gap-2 min-w-0">
                    <div class="w-5 h-5 rounded-full bg-teal-100 flex items-center justify-center text-[9px] font-bold text-teal-700 shrink-0">MT</div>
                    <select class="text-sm font-medium text-gray-900 bg-transparent border-none cursor-pointer focus:ring-0 truncate -ml-1 pr-6">
                        <option>Margaret Thompson — HCP Level 4</option>
                    </select>
                </div>
            </div>
            <div class="flex items-center gap-4 shrink-0">
                <div class="flex items-center gap-1.5">
                    <span class="text-[10px] font-semibold text-gray-400 uppercase tracking-wider">Date</span>
                    <input type="text" value="09/03/2026" class="w-[90px] text-sm text-gray-800 bg-transparent border-none text-center tabular-nums focus:ring-0">
                </div>
                <div class="flex items-center gap-1.5">
                    <span class="text-[10px] font-semibold text-gray-400 uppercase tracking-wider">Due</span>
                    <input type="text" value="23/03/2026" class="w-[90px] text-sm text-gray-800 bg-transparent border-none text-center tabular-nums focus:ring-0">
                </div>
                <div class="flex items-center gap-1.5">
                    <span class="text-[10px] font-semibold text-gray-400 uppercase tracking-wider">Ref</span>
                    <input type="text" value="INV-001" class="w-[80px] text-sm text-gray-800 bg-transparent border-none tabular-nums focus:ring-0">
                </div>
                <div class="h-5 w-px bg-gray-200"></div>
                <div class="text-right">
                    <div class="text-[10px] font-semibold text-gray-400 uppercase tracking-wider">Total</div>
                    <div class="text-lg font-bold text-gray-900 tabular-nums -mt-0.5">$179.50</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Line Items — Full-width dense spreadsheet, no padding -->
    <div class="flex-1 bg-white">
        <!-- Column Headers — fixed -->
        <div class="grid grid-cols-[100px_1fr_150px_55px_85px_85px_85px_30px] bg-gray-50 border-b border-gray-300 text-[10px] font-semibold text-gray-500 uppercase tracking-wider sticky top-0 z-10">
            <div class="px-2.5 py-2 sheet-border">Date</div>
            <div class="px-2.5 py-2 sheet-border">Description</div>
            <div class="px-2.5 py-2 sheet-border">Service Type</div>
            <div class="px-2.5 py-2 sheet-border text-right">Qty</div>
            <div class="px-2.5 py-2 sheet-border text-right">Price</div>
            <div class="px-2.5 py-2 sheet-border text-right">Tax</div>
            <div class="px-2.5 py-2 sheet-border text-right">Amount</div>
            <div class="px-2.5 py-2"></div>
        </div>

        <!-- Row 1 -->
        <div class="row grid grid-cols-[100px_1fr_150px_55px_85px_85px_85px_30px] group">
            <div class="sheet-border"><input type="text" value="01/03/2026" class="cell tabular-nums"></div>
            <div class="sheet-border"><input type="text" value="Personal care — morning routine assistance" class="cell"></div>
            <div class="sheet-border"><select class="cell text-gray-700"><option>Personal Care</option></select></div>
            <div class="sheet-border"><input type="text" value="2.00" class="cell text-right tabular-nums"></div>
            <div class="sheet-border"><input type="text" value="$65.00" class="cell text-right tabular-nums"></div>
            <div class="sheet-border"><select class="cell text-right tabular-nums text-gray-500"><option>No Tax</option></select></div>
            <div class="sheet-border px-2.5 py-2 text-sm text-right tabular-nums font-medium">$130.00</div>
            <div class="flex items-center justify-center opacity-0 group-hover:opacity-100">
                <button class="p-0.5 text-gray-300 hover:text-red-500"><svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg></button>
            </div>
        </div>

        <!-- Row 2 -->
        <div class="row grid grid-cols-[100px_1fr_150px_55px_85px_85px_85px_30px] group">
            <div class="sheet-border"><input type="text" value="03/03/2026" class="cell tabular-nums"></div>
            <div class="sheet-border"><input type="text" value="Transport to medical appointment" class="cell"></div>
            <div class="sheet-border"><select class="cell text-gray-700"><option>Transport</option></select></div>
            <div class="sheet-border"><input type="text" value="1.00" class="cell text-right tabular-nums"></div>
            <div class="sheet-border"><input type="text" value="$45.00" class="cell text-right tabular-nums"></div>
            <div class="sheet-border"><select class="cell text-right tabular-nums text-gray-500"><option>GST 10%</option></select></div>
            <div class="sheet-border px-2.5 py-2 text-sm text-right tabular-nums font-medium">$49.50</div>
            <div class="flex items-center justify-center opacity-0 group-hover:opacity-100">
                <button class="p-0.5 text-gray-300 hover:text-red-500"><svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg></button>
            </div>
        </div>

        <!-- Row 3 -->
        <div class="row grid grid-cols-[100px_1fr_150px_55px_85px_85px_85px_30px] group">
            <div class="sheet-border"><input type="text" value="05/03/2026" class="cell tabular-nums"></div>
            <div class="sheet-border"><input type="text" value="Domestic assistance — house cleaning" class="cell"></div>
            <div class="sheet-border"><select class="cell text-gray-700"><option>Domestic</option></select></div>
            <div class="sheet-border"><input type="text" value="3.00" class="cell text-right tabular-nums"></div>
            <div class="sheet-border"><input type="text" value="$55.00" class="cell text-right tabular-nums"></div>
            <div class="sheet-border"><select class="cell text-right tabular-nums text-gray-500"><option>No Tax</option></select></div>
            <div class="sheet-border px-2.5 py-2 text-sm text-right tabular-nums font-medium">$165.00</div>
            <div class="flex items-center justify-center opacity-0 group-hover:opacity-100">
                <button class="p-0.5 text-gray-300 hover:text-red-500"><svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg></button>
            </div>
        </div>

        <!-- Row 4 (empty) -->
        <div class="row grid grid-cols-[100px_1fr_150px_55px_85px_85px_85px_30px] border-b border-gray-200">
            <div class="sheet-border"><input type="text" placeholder="dd/mm/yyyy" class="cell tabular-nums placeholder:text-gray-300"></div>
            <div class="sheet-border"><input type="text" placeholder="Add item..." class="cell placeholder:text-gray-300"></div>
            <div class="sheet-border"><select class="cell text-gray-300"><option>—</option></select></div>
            <div class="sheet-border"><input type="text" placeholder="0" class="cell text-right tabular-nums placeholder:text-gray-300"></div>
            <div class="sheet-border"><input type="text" placeholder="$0.00" class="cell text-right tabular-nums placeholder:text-gray-300"></div>
            <div class="sheet-border"><select class="cell text-right tabular-nums text-gray-300"><option>No Tax</option></select></div>
            <div class="sheet-border px-2.5 py-2 text-sm text-right tabular-nums text-gray-300">$0.00</div>
            <div></div>
        </div>

        <!-- Add line button -->
        <div class="px-3 py-2 border-b border-gray-200">
            <button class="text-xs text-teal-700 hover:text-teal-800 font-medium flex items-center gap-1">
                <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4"/></svg>
                Add a new line
            </button>
        </div>

        <!-- Totals — right-aligned, tight -->
        <div class="flex justify-end px-5 py-3">
            <div class="w-[220px]">
                <div class="flex justify-between py-1 text-sm">
                    <span class="text-gray-500">Subtotal</span>
                    <span class="tabular-nums text-gray-700">$340.00</span>
                </div>
                <div class="flex justify-between py-1 text-sm">
                    <span class="text-gray-500">GST</span>
                    <span class="tabular-nums text-gray-600">$4.50</span>
                </div>
                <div class="flex justify-between py-2 text-sm font-bold border-t border-gray-300 mt-1">
                    <span class="text-gray-900 uppercase text-xs tracking-wider">Total</span>
                    <span class="tabular-nums text-gray-900 text-base">$344.50</span>
                </div>
            </div>
        </div>

        <!-- Bank Details + Declaration — inline compact row -->
        <div class="border-t border-gray-200 bg-gray-50 px-5 py-3">
            <div class="flex items-start gap-8">
                <!-- Bank details -->
                <div class="flex items-center gap-3">
                    <svg class="w-4 h-4 text-green-500 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                    <div class="text-xs text-gray-500">
                        <span class="font-medium text-gray-700">Bank Details:</span>
                        BSB 062-000 · Account ****4521 · Acme Health Services Pty Ltd
                    </div>
                </div>
                <!-- Declaration -->
                <label class="flex items-start gap-2 cursor-pointer flex-1 min-w-0">
                    <input type="checkbox" class="mt-0.5 w-3.5 h-3.5 text-teal-700 border-gray-300 rounded focus:ring-teal-500 shrink-0">
                    <span class="text-[11px] text-gray-500 leading-relaxed">I declare the information is accurate and the services were delivered as described. Bank details are correct for payment.</span>
                </label>
            </div>
        </div>
    </div>
</div>

<script src="viewer-toolbar.js" defer></script>
</body>
</html>
