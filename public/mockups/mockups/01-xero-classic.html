<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bill Form V3 — Variation 1: Xero Classic</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        teal: { 50: '#f0fdfa', 100: '#ccfbf1', 200: '#99f6e4', 300: '#5eead4', 400: '#2dd4bf', 500: '#43C0BE', 600: '#0d9488', 700: '#007F7E', 800: '#115e59', 900: '#134e4a' },
                        primary: { 700: '#2C4C79' }
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        .tabular-nums { font-variant-numeric: tabular-nums; }
        input:focus, select:focus { outline: none; box-shadow: 0 0 0 2px rgba(0,127,126,0.2); border-color: #007F7E; }
        /* Spreadsheet-style inputs */
        .cell-input { border: none; background: transparent; width: 100%; height: 100%; padding: 6px 8px; font-size: 13px; }
        .cell-input:focus { background: #f0fdfa; }
        .grid-row:hover { background: #f9fafb; }
        .grid-row:focus-within { background: #f0fdfa; }
        /* Resize handle */
        .resize-handle { cursor: col-resize; width: 4px; background: transparent; transition: background 0.15s; }
        .resize-handle:hover { background: #007F7E; }
    </style>
</head>
<body class="bg-gray-50 flex">

<!-- ===== SIDEBAR (skeleton — framing only) ===== -->
<aside class="w-60 bg-white border-r border-gray-200 flex flex-col shrink-0 h-screen sticky top-0">
    <div class="px-4 py-4 border-b border-gray-100">
        <div class="flex items-center gap-2.5">
            <div class="h-8 w-8 rounded-lg bg-gray-200 animate-pulse"></div>
            <div class="h-4 w-24 rounded bg-gray-200 animate-pulse"></div>
        </div>
        <p class="mt-2 text-[9px] text-gray-300 uppercase tracking-widest text-center">Framing only</p>
    </div>
    <div class="px-3 py-3">
        <div class="h-8 rounded-lg bg-gray-100 animate-pulse"></div>
    </div>
    <nav class="flex-1 overflow-y-auto px-3 py-2 space-y-1.5">
        <div class="flex items-center gap-2.5 px-3 py-2">
            <div class="h-4 w-4 rounded bg-gray-200 animate-pulse"></div>
            <div class="h-3.5 w-20 rounded bg-gray-200 animate-pulse"></div>
        </div>
        <div class="flex items-center gap-2.5 px-3 py-2">
            <div class="h-4 w-4 rounded bg-gray-200 animate-pulse"></div>
            <div class="h-3.5 w-24 rounded bg-gray-200 animate-pulse"></div>
        </div>
        <!-- Active item -->
        <div class="flex items-center gap-2.5 px-3 py-2 rounded-lg bg-teal-50">
            <div class="h-4 w-4 rounded bg-teal-200 animate-pulse"></div>
            <div class="h-3.5 w-18 rounded bg-teal-200 animate-pulse"></div>
        </div>
        <div class="flex items-center gap-2.5 px-3 py-2">
            <div class="h-4 w-4 rounded bg-gray-200 animate-pulse"></div>
            <div class="h-3.5 w-16 rounded bg-gray-200 animate-pulse"></div>
        </div>
        <div class="flex items-center gap-2.5 px-3 py-2">
            <div class="h-4 w-4 rounded bg-gray-200 animate-pulse"></div>
            <div class="h-3.5 w-20 rounded bg-gray-200 animate-pulse"></div>
        </div>
    </nav>
    <div class="border-t border-gray-100 px-3 py-3">
        <div class="flex items-center gap-2.5">
            <div class="h-8 w-8 rounded-full bg-gray-200 animate-pulse"></div>
            <div class="flex-1 space-y-1.5">
                <div class="h-3 w-24 rounded bg-gray-200 animate-pulse"></div>
                <div class="h-2.5 w-20 rounded bg-gray-100 animate-pulse"></div>
            </div>
        </div>
    </div>
</aside>

<!-- ===== MAIN CONTENT ===== -->
<div class="flex-1 flex flex-col min-h-screen">

    <!-- Page header -->
    <header class="bg-white border-b border-gray-200 px-6 py-3 flex items-center justify-between">
        <div class="flex items-center gap-3">
            <a href="#" class="text-teal-700 hover:text-teal-800 text-sm flex items-center gap-1">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
                Invoices
            </a>
            <h1 class="text-lg font-semibold text-gray-900">New Invoice</h1>
            <span class="px-2 py-0.5 text-[10px] font-bold tracking-wider uppercase bg-teal-100 text-teal-700 rounded">RWVGP</span>
            <span class="px-2 py-0.5 text-[10px] font-medium bg-amber-100 text-amber-700 rounded">Draft</span>
        </div>
        <div class="flex items-center gap-2">
            <button class="relative p-2 text-gray-400 hover:text-gray-600 rounded-lg hover:bg-gray-100">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13"/></svg>
                <span class="absolute -top-0.5 -right-0.5 w-4 h-4 bg-teal-600 text-white text-[9px] font-bold rounded-full flex items-center justify-center">2</span>
            </button>
        </div>
    </header>

    <!-- Split panel: Document sidebar + Form -->
    <div class="flex-1 flex overflow-hidden">

        <!-- LEFT: Document Sidebar -->
        <div class="w-[340px] bg-gray-100 border-r border-gray-200 flex flex-col shrink-0">
            <div class="px-4 py-3 border-b border-gray-200 bg-white flex items-center justify-between">
                <span class="text-xs font-medium text-gray-500 uppercase tracking-wider">Documents</span>
                <span class="text-xs text-gray-400">2 files</span>
            </div>

            <!-- PDF Preview area -->
            <div class="flex-1 flex flex-col items-center justify-center p-4">
                <div class="w-full aspect-[3/4] bg-white rounded-lg shadow-sm border border-gray-200 flex items-center justify-center">
                    <div class="text-center">
                        <svg class="w-12 h-12 mx-auto text-gray-300 mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
                        <p class="text-xs text-gray-400">invoice-march-2026.pdf</p>
                        <p class="text-[10px] text-gray-300 mt-1">324 KB</p>
                    </div>
                </div>
            </div>

            <!-- Document list -->
            <div class="border-t border-gray-200 bg-white">
                <div class="px-3 py-2 flex items-center gap-2 hover:bg-gray-50 cursor-pointer border-l-2 border-teal-600">
                    <svg class="w-4 h-4 text-red-500 shrink-0" fill="currentColor" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/></svg>
                    <span class="text-xs text-gray-700 truncate flex-1">invoice-march-2026.pdf</span>
                    <span class="text-[10px] text-gray-400">324 KB</span>
                </div>
                <div class="px-3 py-2 flex items-center gap-2 hover:bg-gray-50 cursor-pointer">
                    <svg class="w-4 h-4 text-blue-500 shrink-0" fill="currentColor" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/></svg>
                    <span class="text-xs text-gray-700 truncate flex-1">timesheet-backup.xlsx</span>
                    <span class="text-[10px] text-gray-400">58 KB</span>
                </div>
                <div class="px-3 py-2 border-t border-gray-100">
                    <button class="text-xs text-teal-700 hover:text-teal-800 font-medium flex items-center gap-1">
                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
                        Upload file
                    </button>
                </div>
            </div>

            <!-- Resize handle -->
            <div class="resize-handle absolute right-0 top-0 bottom-0"></div>
        </div>

        <!-- RIGHT: Bill Form -->
        <div class="flex-1 flex flex-col overflow-y-auto">
            <div class="flex-1 p-6 max-w-[1100px]">

                <!-- Invoice Header Fields — Xero-style horizontal row -->
                <div class="bg-white rounded-lg border border-gray-200 mb-4">
                    <div class="grid grid-cols-[1fr_140px_140px_160px] gap-0 divide-x divide-gray-200">
                        <!-- TO -->
                        <div class="p-3">
                            <label class="text-[10px] font-medium text-gray-400 uppercase tracking-wider">To</label>
                            <div class="mt-1 flex items-center gap-2">
                                <div class="w-6 h-6 rounded-full bg-teal-100 flex items-center justify-center text-[10px] font-bold text-teal-700">MT</div>
                                <select class="cell-input text-sm font-medium text-gray-900 cursor-pointer">
                                    <option>Margaret Thompson — HCP Level 4</option>
                                </select>
                            </div>
                        </div>
                        <!-- DATE -->
                        <div class="p-3">
                            <label class="text-[10px] font-medium text-gray-400 uppercase tracking-wider">Date</label>
                            <input type="text" value="09/03/2026" class="cell-input mt-1 text-sm text-gray-900">
                        </div>
                        <!-- DUE -->
                        <div class="p-3">
                            <label class="text-[10px] font-medium text-gray-400 uppercase tracking-wider">Due Date</label>
                            <input type="text" value="23/03/2026" class="cell-input mt-1 text-sm text-gray-900">
                        </div>
                        <!-- REF -->
                        <div class="p-3">
                            <label class="text-[10px] font-medium text-gray-400 uppercase tracking-wider">Reference</label>
                            <input type="text" value="INV-001" class="cell-input mt-1 text-sm text-gray-900">
                        </div>
                    </div>
                </div>

                <!-- Line Items — Spreadsheet Grid -->
                <div class="bg-white rounded-lg border border-gray-200 overflow-hidden">
                    <!-- Column Headers -->
                    <div class="grid grid-cols-[110px_1fr_160px_60px_90px_90px_90px_32px] bg-gray-50 border-b border-gray-200 text-[10px] font-medium text-gray-500 uppercase tracking-wider">
                        <div class="px-3 py-2">Service Date</div>
                        <div class="px-3 py-2">Description</div>
                        <div class="px-3 py-2">Service Type</div>
                        <div class="px-3 py-2 text-right">Qty</div>
                        <div class="px-3 py-2 text-right">Unit Price</div>
                        <div class="px-3 py-2 text-right">Tax</div>
                        <div class="px-3 py-2 text-right">Amount</div>
                        <div class="px-3 py-2"></div>
                    </div>

                    <!-- Row 1 -->
                    <div class="grid-row grid grid-cols-[110px_1fr_160px_60px_90px_90px_90px_32px] border-b border-gray-100 group">
                        <div class="border-r border-gray-100"><input type="text" value="01/03/2026" class="cell-input text-sm tabular-nums"></div>
                        <div class="border-r border-gray-100"><input type="text" value="Personal care — morning routine assistance" class="cell-input text-sm"></div>
                        <div class="border-r border-gray-100">
                            <select class="cell-input text-sm text-gray-700">
                                <option>Personal Care</option>
                            </select>
                        </div>
                        <div class="border-r border-gray-100"><input type="text" value="2.00" class="cell-input text-sm text-right tabular-nums"></div>
                        <div class="border-r border-gray-100"><input type="text" value="$65.00" class="cell-input text-sm text-right tabular-nums"></div>
                        <div class="border-r border-gray-100">
                            <select class="cell-input text-sm text-right tabular-nums text-gray-600">
                                <option>No Tax</option>
                            </select>
                        </div>
                        <div class="px-3 py-1.5 text-sm text-right tabular-nums font-medium text-gray-900">$130.00</div>
                        <div class="flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
                            <button class="p-1 text-gray-300 hover:text-red-500 rounded">
                                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                            </button>
                        </div>
                    </div>

                    <!-- Row 2 -->
                    <div class="grid-row grid grid-cols-[110px_1fr_160px_60px_90px_90px_90px_32px] border-b border-gray-100 group">
                        <div class="border-r border-gray-100"><input type="text" value="03/03/2026" class="cell-input text-sm tabular-nums"></div>
                        <div class="border-r border-gray-100"><input type="text" value="Transport to medical appointment" class="cell-input text-sm"></div>
                        <div class="border-r border-gray-100">
                            <select class="cell-input text-sm text-gray-700">
                                <option>Transport</option>
                            </select>
                        </div>
                        <div class="border-r border-gray-100"><input type="text" value="1.00" class="cell-input text-sm text-right tabular-nums"></div>
                        <div class="border-r border-gray-100"><input type="text" value="$45.00" class="cell-input text-sm text-right tabular-nums"></div>
                        <div class="border-r border-gray-100">
                            <select class="cell-input text-sm text-right tabular-nums text-gray-600">
                                <option>GST 10%</option>
                            </select>
                        </div>
                        <div class="px-3 py-1.5 text-sm text-right tabular-nums font-medium text-gray-900">$49.50</div>
                        <div class="flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
                            <button class="p-1 text-gray-300 hover:text-red-500 rounded">
                                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                            </button>
                        </div>
                    </div>

                    <!-- Row 3 (empty — auto-spawned) -->
                    <div class="grid-row grid grid-cols-[110px_1fr_160px_60px_90px_90px_90px_32px] border-b border-gray-100 group">
                        <div class="border-r border-gray-100"><input type="text" placeholder="dd/mm/yyyy" class="cell-input text-sm tabular-nums placeholder:text-gray-300"></div>
                        <div class="border-r border-gray-100"><input type="text" placeholder="Add item..." class="cell-input text-sm placeholder:text-gray-300"></div>
                        <div class="border-r border-gray-100">
                            <select class="cell-input text-sm text-gray-300">
                                <option>—</option>
                            </select>
                        </div>
                        <div class="border-r border-gray-100"><input type="text" placeholder="0" class="cell-input text-sm text-right tabular-nums placeholder:text-gray-300"></div>
                        <div class="border-r border-gray-100"><input type="text" placeholder="$0.00" class="cell-input text-sm text-right tabular-nums placeholder:text-gray-300"></div>
                        <div class="border-r border-gray-100">
                            <select class="cell-input text-sm text-right tabular-nums text-gray-300">
                                <option>No Tax</option>
                            </select>
                        </div>
                        <div class="px-3 py-1.5 text-sm text-right tabular-nums text-gray-300">$0.00</div>
                        <div></div>
                    </div>

                    <!-- Footer: Add line + Totals -->
                    <div class="grid grid-cols-[110px_1fr_160px_60px_90px_90px_90px_32px] items-end">
                        <div class="col-span-3 px-3 py-2">
                            <button class="text-xs text-teal-700 hover:text-teal-800 font-medium flex items-center gap-1">
                                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
                                Add a new line
                            </button>
                        </div>
                        <div></div>
                        <div class="col-span-2 px-3 py-1 text-right">
                            <div class="text-xs text-gray-500">Subtotal</div>
                        </div>
                        <div class="px-3 py-1 text-right">
                            <div class="text-sm tabular-nums font-medium text-gray-700">$175.00</div>
                        </div>
                        <div></div>

                        <div class="col-span-4"></div>
                        <div class="col-span-2 px-3 py-0.5 text-right">
                            <div class="text-xs text-gray-500">GST</div>
                        </div>
                        <div class="px-3 py-0.5 text-right">
                            <div class="text-sm tabular-nums text-gray-600">$4.50</div>
                        </div>
                        <div></div>

                        <div class="col-span-4"></div>
                        <div class="col-span-2 px-3 py-1.5 text-right border-t border-gray-200">
                            <div class="text-xs font-semibold text-gray-900 uppercase">Total</div>
                        </div>
                        <div class="px-3 py-1.5 text-right border-t border-gray-200">
                            <div class="text-base tabular-nums font-bold text-gray-900">$179.50</div>
                        </div>
                        <div class="border-t border-gray-200"></div>
                    </div>
                </div>

                <!-- Bank Details — Collapsible -->
                <div class="mt-4 bg-white rounded-lg border border-gray-200">
                    <button class="w-full px-4 py-3 flex items-center justify-between text-left hover:bg-gray-50 transition-colors">
                        <div class="flex items-center gap-2">
                            <svg class="w-4 h-4 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                            <span class="text-sm font-medium text-gray-700">Bank Details</span>
                            <span class="text-xs text-gray-400">BSB: 062-000 · Acct: ****4521</span>
                        </div>
                        <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
                    </button>
                </div>

                <!-- Declaration -->
                <div class="mt-4 px-1">
                    <label class="flex items-start gap-3 cursor-pointer group">
                        <input type="checkbox" class="mt-0.5 w-4 h-4 text-teal-700 border-gray-300 rounded focus:ring-teal-500">
                        <span class="text-xs text-gray-500 leading-relaxed group-hover:text-gray-700">I declare that the information provided is accurate, and the services listed were delivered to the care recipient as described. I confirm the bank details above are correct for payment.</span>
                    </label>
                </div>
            </div>

            <!-- Sticky Action Bar -->
            <div class="sticky bottom-0 bg-white border-t border-gray-200 px-6 py-3 flex items-center justify-between">
                <button class="flex items-center gap-2 px-4 py-2 text-sm font-medium text-gray-600 hover:text-gray-800 border border-gray-300 rounded-lg hover:bg-gray-50 transition-colors">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4"/></svg>
                    Save Draft
                </button>
                <div class="flex items-center gap-3">
                    <button class="px-4 py-2 text-sm text-gray-500 hover:text-gray-700">Cancel</button>
                    <button class="flex items-center gap-2 px-5 py-2 text-sm font-medium text-white bg-teal-700 rounded-lg hover:bg-teal-800 transition-colors shadow-sm disabled:opacity-50 disabled:cursor-not-allowed" disabled>
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/></svg>
                        Submit Invoice
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="viewer-toolbar.js" defer></script>
</body>
</html>
