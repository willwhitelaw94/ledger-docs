<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>CV Integration</title><script src="https://cdn.tailwindcss.com"></script><script>tailwind.config={theme:{extend:{colors:{teal:{700:"#007F7E",500:"#43C0BE"},"primary-blue":{700:"#2C4C79"}}}}}</script><style>.tab-btn.active{background:#007F7E;color:#fff}.screen{display:none}.screen.active{display:block}</style></head><body class="bg-gray-50 min-h-screen"><nav class="bg-white border-b border-gray-200 px-4 py-2 flex items-center gap-2 text-sm flex-wrap"><span class="font-bold text-primary-blue-700">CVI</span><span class="text-gray-400">|</span><button onclick="show('calendar')" class="tab-btn active px-3 py-1 rounded-lg text-xs font-medium" id="btn-calendar">Worker Calendar</button><button onclick="show('creds')" class="tab-btn bg-gray-100 px-3 py-1 rounded-lg text-xs font-medium" id="btn-creds">Credentials</button></nav><div class="flex min-h-[calc(100vh-44px)]"><aside class="w-56 bg-gray-900 text-gray-300 text-sm hidden md:block flex-shrink-0"><div class="p-4 border-b border-gray-700"><span class="text-white font-bold">TC Portal</span></div><nav class="p-2 space-y-1"><a class="block px-3 py-2 rounded-lg text-gray-400">Dashboard</a><a class="block px-3 py-2 rounded-lg bg-teal-700 text-white">Active</a><a class="block px-3 py-2 rounded-lg text-gray-400">Settings</a></nav></aside><main class="flex-1 p-6 overflow-auto"><div id="calendar" class="screen active"><h1 class="text-xl font-bold text-gray-900 mb-4">Worker Availability</h1><div class="bg-white rounded-xl shadow-sm border p-4 overflow-x-auto"><table class="w-full text-xs"><thead><tr><th class="p-2 text-left">Worker</th><th class="p-2">Mon</th><th class="p-2">Tue</th><th class="p-2">Wed</th><th class="p-2">Thu</th><th class="p-2">Fri</th></tr></thead><tbody><tr><td class="p-2 font-medium">Angela T.</td><td class="p-2"><span class="bg-teal-100 text-teal-800 rounded px-1 py-0.5">9-12</span></td><td class="p-2"><span class="bg-teal-100 text-teal-800 rounded px-1 py-0.5">9-5</span></td><td class="p-2"><span class="bg-red-100 text-red-800 rounded px-1 py-0.5">Busy</span></td><td class="p-2"><span class="bg-teal-100 text-teal-800 rounded px-1 py-0.5">9-5</span></td><td class="p-2"><span class="bg-teal-100 text-teal-800 rounded px-1 py-0.5">9-1</span></td></tr><tr><td class="p-2 font-medium">Mark R.</td><td class="p-2"><span class="bg-teal-100 text-teal-800 rounded px-1 py-0.5">8-4</span></td><td class="p-2"><span class="bg-teal-100 text-teal-800 rounded px-1 py-0.5">8-4</span></td><td class="p-2"><span class="bg-teal-100 text-teal-800 rounded px-1 py-0.5">8-4</span></td><td class="p-2"><span class="bg-gray-100 text-gray-500 rounded px-1 py-0.5">Off</span></td><td class="p-2"><span class="bg-teal-100 text-teal-800 rounded px-1 py-0.5">8-4</span></td></tr></tbody></table></div></div><div id="creds" class="screen"><h1 class="text-xl font-bold text-gray-900 mb-4">Worker Credentials</h1><div class="bg-white rounded-xl shadow-sm border overflow-hidden"><table class="w-full text-sm"><thead class="bg-gray-50 text-gray-500 text-xs uppercase"><tr><th class="px-4 py-3 text-left">Worker</th><th class="px-4 py-3 text-left">Qualification</th><th class="px-4 py-3 text-left">Expiry</th><th class="px-4 py-3 text-left">Status</th></tr></thead><tbody class="divide-y divide-gray-200"><tr><td class="px-4 py-3 font-medium">Angela Thompson</td><td class="px-4 py-3">Registered Nurse</td><td class="px-4 py-3">15 Apr 2026</td><td class="px-4 py-3"><span class="bg-orange-100 text-orange-800 text-xs px-2 py-0.5 rounded-full">Expiring</span></td></tr><tr><td class="px-4 py-3 font-medium">Mark Reynolds</td><td class="px-4 py-3">Cert III Individual Support</td><td class="px-4 py-3">No expiry</td><td class="px-4 py-3"><span class="bg-green-100 text-green-800 text-xs px-2 py-0.5 rounded-full">Valid</span></td></tr></tbody></table></div></div></main></div><script>function show(id){document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));document.getElementById(id).classList.add("active");document.querySelectorAll(".tab-btn").forEach(b=>{b.classList.remove("active");b.classList.add("bg-gray-100")});document.getElementById("btn-"+id).classList.add("active");document.getElementById("btn-"+id).classList.remove("bg-gray-100")}</script></body></html>
