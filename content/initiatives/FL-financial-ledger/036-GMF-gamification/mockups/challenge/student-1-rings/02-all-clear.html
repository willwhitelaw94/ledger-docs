<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ring Rachel — All Clear</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; }

    @keyframes ring-complete {
      0% { stroke-dashoffset: 600; }
      80% { stroke-dashoffset: 0; }
      100% { stroke-dashoffset: 0; }
    }
    .ring-complete-anim {
      animation: ring-complete 2s ease-out forwards;
    }

    @keyframes glow-pulse {
      0%, 100% { filter: drop-shadow(0 0 8px var(--glow)) drop-shadow(0 0 24px var(--glow)); opacity: 1; }
      50% { filter: drop-shadow(0 0 16px var(--glow)) drop-shadow(0 0 40px var(--glow)); opacity: 0.95; }
    }
    .glow-pulse { animation: glow-pulse 2s ease-in-out infinite; animation-delay: 2s; }

    @keyframes check-appear {
      0% { opacity: 0; transform: scale(0.3); }
      60% { opacity: 1; transform: scale(1.15); }
      100% { opacity: 1; transform: scale(1); }
    }
    .check-appear { animation: check-appear 0.5s ease-out forwards; animation-delay: 1.8s; opacity: 0; }

    @keyframes confetti-fall {
      0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
      100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
    }
    .confetti-ring {
      position: fixed;
      border-radius: 50%;
      border: 2px solid;
      animation: confetti-fall linear forwards;
      pointer-events: none;
      z-index: 50;
    }

    @keyframes fade-in { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
    .fade-in-d { animation: fade-in 0.6s ease-out forwards; opacity: 0; }
    .d1 { animation-delay: 2.2s; }
    .d2 { animation-delay: 2.5s; }
    .d3 { animation-delay: 2.8s; }
  </style>
  <script>
    tailwind.config = { theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] } } } }
  </script>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen flex">

  <!-- Sidebar -->
  <aside class="w-60 bg-gray-900 border-r border-gray-800 min-h-screen flex-shrink-0 p-4 space-y-2">
    <div class="flex items-center gap-2 mb-6 px-2">
      <div class="w-8 h-8 rounded-lg bg-purple-600 flex items-center justify-center text-sm font-bold">M</div>
      <span class="font-semibold text-sm">MoneyQuest</span>
    </div>
    <div class="h-9 bg-gray-800 rounded-lg animate-pulse"></div>
    <div class="h-9 bg-purple-600/20 border border-purple-500/30 rounded-lg animate-pulse"></div>
    <div class="h-9 bg-gray-800 rounded-lg animate-pulse"></div>
    <div class="h-9 bg-gray-800 rounded-lg animate-pulse"></div>
    <div class="h-9 bg-gray-800 rounded-lg animate-pulse"></div>
    <div class="mt-6 h-px bg-gray-800"></div>
    <div class="h-9 bg-gray-800 rounded-lg animate-pulse"></div>
    <div class="h-9 bg-gray-800 rounded-lg animate-pulse"></div>
  </aside>

  <!-- Main Content -->
  <main class="flex-1 overflow-y-auto flex flex-col items-center justify-center px-8 py-12">

    <!-- Hero Ring -->
    <div class="relative mb-10" style="width: 300px; height: 300px;">
      <svg viewBox="0 0 300 300" class="w-full h-full" style="--glow: rgba(20,184,166,0.4);">
        <defs>
          <linearGradient id="grad-complete" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#14b8a6"/>
            <stop offset="40%" stop-color="#007F7E"/>
            <stop offset="100%" stop-color="#9333ea"/>
          </linearGradient>
        </defs>
        <!-- Background ring -->
        <circle cx="150" cy="150" r="130" fill="none" stroke="#1e293b" stroke-width="12" />
        <!-- Completing ring -->
        <circle cx="150" cy="150" r="130" fill="none" stroke="url(#grad-complete)" stroke-width="12"
          stroke-linecap="round" transform="rotate(-90 150 150)"
          stroke-dasharray="817" stroke-dashoffset="817"
          class="ring-complete-anim glow-pulse" />
        <!-- Second decorative ring -->
        <circle cx="150" cy="150" r="112" fill="none" stroke="#1e293b" stroke-width="4" />
        <circle cx="150" cy="150" r="112" fill="none" stroke="rgba(20,184,166,0.3)" stroke-width="4"
          stroke-linecap="round" transform="rotate(-90 150 150)"
          stroke-dasharray="704" stroke-dashoffset="704"
          class="ring-complete-anim" style="animation-delay: 0.3s;" />
      </svg>

      <!-- Center content -->
      <div class="absolute inset-0 flex flex-col items-center justify-center check-appear">
        <svg class="w-16 h-16 text-teal-400 mb-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
        </svg>
        <span class="text-xl font-bold text-white">All Clear</span>
      </div>
    </div>

    <!-- Session Stats -->
    <div class="text-center mb-10 fade-in-d d1">
      <p class="text-gray-400 text-sm mb-6">Everything is reconciled, reviewed, and up to date.</p>
      <div class="flex items-center gap-8 justify-center">
        <!-- Stat ring: Tasks -->
        <div class="flex flex-col items-center">
          <div class="relative w-16 h-16 mb-2">
            <svg viewBox="0 0 64 64" class="w-full h-full">
              <circle cx="32" cy="32" r="27" fill="none" stroke="#1e293b" stroke-width="5"/>
              <circle cx="32" cy="32" r="27" fill="none" stroke="#14b8a6" stroke-width="5"
                stroke-linecap="round" transform="rotate(-90 32 32)"
                stroke-dasharray="170" stroke-dashoffset="0"/>
            </svg>
            <div class="absolute inset-0 flex items-center justify-center text-sm font-bold text-teal-400">12</div>
          </div>
          <span class="text-[11px] text-gray-500">Tasks Done</span>
        </div>
        <!-- Stat ring: Time -->
        <div class="flex flex-col items-center">
          <div class="relative w-16 h-16 mb-2">
            <svg viewBox="0 0 64 64" class="w-full h-full">
              <circle cx="32" cy="32" r="27" fill="none" stroke="#1e293b" stroke-width="5"/>
              <circle cx="32" cy="32" r="27" fill="none" stroke="#9333ea" stroke-width="5"
                stroke-linecap="round" transform="rotate(-90 32 32)"
                stroke-dasharray="170" stroke-dashoffset="34"/>
            </svg>
            <div class="absolute inset-0 flex items-center justify-center text-sm font-bold text-purple-400">47m</div>
          </div>
          <span class="text-[11px] text-gray-500">Session Time</span>
        </div>
        <!-- Stat ring: Streak -->
        <div class="flex flex-col items-center">
          <div class="relative w-16 h-16 mb-2">
            <svg viewBox="0 0 64 64" class="w-full h-full">
              <circle cx="32" cy="32" r="27" fill="none" stroke="#1e293b" stroke-width="5"/>
              <circle cx="32" cy="32" r="27" fill="none" stroke="#f59e0b" stroke-width="5"
                stroke-linecap="round" transform="rotate(-90 32 32)"
                stroke-dasharray="170" stroke-dashoffset="42"/>
            </svg>
            <div class="absolute inset-0 flex items-center justify-center text-sm font-bold text-amber-400">14</div>
          </div>
          <span class="text-[11px] text-gray-500">Week Streak</span>
        </div>
        <!-- Stat ring: Accuracy -->
        <div class="flex flex-col items-center">
          <div class="relative w-16 h-16 mb-2">
            <svg viewBox="0 0 64 64" class="w-full h-full">
              <circle cx="32" cy="32" r="27" fill="none" stroke="#1e293b" stroke-width="5"/>
              <circle cx="32" cy="32" r="27" fill="none" stroke="#14b8a6" stroke-width="5"
                stroke-linecap="round" transform="rotate(-90 32 32)"
                stroke-dasharray="170" stroke-dashoffset="5"/>
            </svg>
            <div class="absolute inset-0 flex items-center justify-center text-sm font-bold text-teal-400">97%</div>
          </div>
          <span class="text-[11px] text-gray-500">Accuracy</span>
        </div>
      </div>
    </div>

    <!-- Badge Earned -->
    <div class="fade-in-d d2 bg-gray-900 border border-purple-500/30 rounded-xl p-5 max-w-sm w-full text-center mb-6" style="box-shadow: 0 0 30px rgba(147,51,234,0.1);">
      <div class="flex items-center justify-center gap-2 mb-2">
        <div class="w-8 h-8 rounded-full border-2 border-purple-500 flex items-center justify-center text-sm">&#127942;</div>
        <span class="text-sm font-semibold text-purple-300">Badge Unlocked</span>
      </div>
      <p class="text-xs text-gray-400">Reconciliation Master — cleared all bank accounts in a single session</p>
    </div>

    <!-- Action -->
    <div class="fade-in-d d3 flex items-center gap-3">
      <button class="px-5 py-2.5 bg-purple-600 hover:bg-purple-500 text-white text-sm font-medium rounded-lg transition-colors">View Dashboard</button>
      <button class="px-5 py-2.5 bg-gray-800 hover:bg-gray-700 text-gray-300 text-sm font-medium rounded-lg border border-gray-700 transition-colors">Share Result</button>
    </div>
  </main>

  <!-- Confetti Rings (generated via JS) -->
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const colors = ['#14b8a6', '#9333ea', '#f59e0b', '#007F7E', '#a78bfa', '#fbbf24'];
      setTimeout(() => {
        for (let i = 0; i < 40; i++) {
          const ring = document.createElement('div');
          ring.className = 'confetti-ring';
          const size = Math.random() * 12 + 6;
          ring.style.width = size + 'px';
          ring.style.height = size + 'px';
          ring.style.borderColor = colors[Math.floor(Math.random() * colors.length)];
          ring.style.left = Math.random() * 100 + 'vw';
          ring.style.top = '-20px';
          ring.style.animationDuration = (Math.random() * 3 + 2) + 's';
          ring.style.animationDelay = (Math.random() * 1.5) + 's';
          document.body.appendChild(ring);
          setTimeout(() => ring.remove(), 6000);
        }
      }, 1800);
    });
  </script>

  <script src="viewer-toolbar.js" defer></script>
</body>
</html>
