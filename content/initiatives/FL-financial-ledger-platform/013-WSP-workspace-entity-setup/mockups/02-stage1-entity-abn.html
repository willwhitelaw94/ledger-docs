<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>02 — Stage 1: Entity & ABN | 013-WSP</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            teal: { 50:'#F0FAFA',100:'#D5F1F0',200:'#BAE8E7',300:'#94DBDA',400:'#66CCCA',500:'#43C0BE',600:'#2F9E9C',700:'#007F7E',800:'#005656',900:'#003D3D' },
          }
        }
      }
    }
  </script>
</head>
<body class="bg-gray-100 flex">

  <!-- ===== SIDEBAR (skeleton — framing only) ===== -->
  <aside class="w-60 bg-white border-r border-gray-200 flex flex-col shrink-0 h-screen sticky top-0">
    <div class="px-4 py-4 border-b border-gray-100">
      <div class="flex items-center gap-2.5">
        <div class="h-8 w-8 rounded-lg bg-gray-200 animate-pulse"></div>
        <div class="h-4 w-24 rounded bg-gray-200 animate-pulse"></div>
      </div>
      <p class="mt-2 text-[9px] text-gray-300 uppercase tracking-widest text-center">Framing only</p>
    </div>
    <div class="px-3 py-3"><div class="h-8 rounded-lg bg-gray-100 animate-pulse"></div></div>
    <nav class="flex-1 overflow-y-auto px-3 py-2 space-y-1.5">
      <div class="flex items-center gap-2.5 px-3 py-2"><div class="h-4 w-4 rounded bg-gray-200 animate-pulse"></div><div class="h-3.5 w-20 rounded bg-gray-200 animate-pulse"></div></div>
      <div class="flex items-center gap-2.5 px-3 py-2"><div class="h-4 w-4 rounded bg-gray-200 animate-pulse"></div><div class="h-3.5 w-24 rounded bg-gray-200 animate-pulse"></div></div>
      <div class="flex items-center gap-2.5 px-3 py-2 rounded-lg bg-teal-50"><div class="h-4 w-4 rounded bg-teal-200 animate-pulse"></div><div class="h-3.5 w-20 rounded bg-teal-200 animate-pulse"></div></div>
      <div class="flex items-center gap-2.5 px-3 py-2"><div class="h-4 w-4 rounded bg-gray-200 animate-pulse"></div><div class="h-3.5 w-16 rounded bg-gray-200 animate-pulse"></div></div>
    </nav>
    <div class="border-t border-gray-100 px-3 py-3">
      <div class="flex items-center gap-2.5">
        <div class="h-8 w-8 rounded-full bg-gray-200 animate-pulse"></div>
        <div class="flex-1 space-y-1.5"><div class="h-3 w-24 rounded bg-gray-200 animate-pulse"></div><div class="h-2.5 w-20 rounded bg-gray-100 animate-pulse"></div></div>
      </div>
    </div>
  </aside>

  <!-- ===== MAIN CONTENT ===== -->
  <main class="flex-1 flex flex-col min-h-screen">

    <!-- Wizard modal overlay -->
    <div class="fixed inset-0 bg-black/50 flex items-center justify-center z-40 p-4" style="left:240px">
      <div class="bg-white rounded-2xl shadow-2xl w-full max-w-2xl max-h-[90vh] overflow-y-auto">

        <!-- Wizard header -->
        <div class="flex items-center justify-between px-6 pt-6 pb-4 border-b border-gray-100">
          <div>
            <p class="text-xs font-medium text-teal-600 uppercase tracking-wide mb-1">New Workspace</p>
            <h2 class="text-xl font-bold text-gray-900">Set up your entity</h2>
          </div>
          <button class="h-8 w-8 rounded-full hover:bg-gray-100 flex items-center justify-center text-gray-400 transition-colors">
            <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
          </button>
        </div>

        <!-- Step indicator -->
        <div class="px-6 pt-4 pb-2">
          <div class="flex items-center gap-0">
            <!-- Step 1 — active -->
            <div class="flex items-center gap-2">
              <div class="w-7 h-7 rounded-full bg-teal-700 flex items-center justify-center text-xs font-bold text-white">1</div>
              <span class="text-xs font-semibold text-teal-700">Entity & ABN</span>
            </div>
            <div class="flex-1 h-0.5 bg-gray-200 mx-3"></div>
            <!-- Step 2 — upcoming -->
            <div class="flex items-center gap-2">
              <div class="w-7 h-7 rounded-full bg-gray-200 flex items-center justify-center text-xs font-medium text-gray-500">2</div>
              <span class="text-xs text-gray-400">About Your Business</span>
            </div>
            <div class="flex-1 h-0.5 bg-gray-200 mx-3"></div>
            <!-- Step 3 — upcoming -->
            <div class="flex items-center gap-2">
              <div class="w-7 h-7 rounded-full bg-gray-200 flex items-center justify-center text-xs font-medium text-gray-500">3</div>
              <span class="text-xs text-gray-400">Review Accounts</span>
            </div>
          </div>
        </div>

        <!-- Form body -->
        <div class="px-6 py-5 space-y-6">

          <!-- Workspace name -->
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1.5">Workspace name <span class="text-red-500">*</span></label>
            <input type="text" value="Apex Electrical Pty Ltd" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm text-gray-900 focus:ring-2 focus:ring-teal-500 focus:border-teal-500 outline-none">
            <p class="mt-1 text-xs text-gray-400">The trading name displayed in the workspace switcher</p>
          </div>

          <!-- Entity type -->
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-3">Entity type <span class="text-red-500">*</span></label>
            <div class="grid grid-cols-3 gap-2.5">

              <!-- Pty Ltd — selected -->
              <button class="relative flex flex-col items-center gap-2 px-3 py-4 rounded-xl border-2 border-teal-600 bg-teal-50 transition-all">
                <div class="w-10 h-10 rounded-xl bg-teal-100 flex items-center justify-center">
                  <svg class="h-5 w-5 text-teal-700" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-2 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/></svg>
                </div>
                <span class="text-xs font-semibold text-teal-800 text-center leading-tight">Pty Ltd</span>
                <div class="absolute top-2 right-2 w-4 h-4 rounded-full bg-teal-600 flex items-center justify-center">
                  <svg class="h-2.5 w-2.5 text-white" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"/></svg>
                </div>
              </button>

              <!-- Trust -->
              <button class="flex flex-col items-center gap-2 px-3 py-4 rounded-xl border-2 border-gray-200 hover:border-gray-300 hover:bg-gray-50 transition-all">
                <div class="w-10 h-10 rounded-xl bg-gray-100 flex items-center justify-center">
                  <svg class="h-5 w-5 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 6l3 1m0 0l-3 9a5.002 5.002 0 006.001 0M6 7l3 9M6 7l6-2m6 2l3-1m-3 1l-3 9a5.002 5.002 0 006.001 0M18 7l3 9m-3-9l-6-2m0-2v2m0 16V5m0 16H9m3 0h3"/></svg>
                </div>
                <span class="text-xs font-medium text-gray-600 text-center leading-tight">Trust</span>
              </button>

              <!-- Sole Trader -->
              <button class="flex flex-col items-center gap-2 px-3 py-4 rounded-xl border-2 border-gray-200 hover:border-gray-300 hover:bg-gray-50 transition-all">
                <div class="w-10 h-10 rounded-xl bg-gray-100 flex items-center justify-center">
                  <svg class="h-5 w-5 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
                </div>
                <span class="text-xs font-medium text-gray-600 text-center leading-tight">Sole Trader</span>
              </button>

              <!-- Partnership -->
              <button class="flex flex-col items-center gap-2 px-3 py-4 rounded-xl border-2 border-gray-200 hover:border-gray-300 hover:bg-gray-50 transition-all">
                <div class="w-10 h-10 rounded-xl bg-gray-100 flex items-center justify-center">
                  <svg class="h-5 w-5 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                </div>
                <span class="text-xs font-medium text-gray-600 text-center leading-tight">Partnership</span>
              </button>

              <!-- SMSF -->
              <button class="flex flex-col items-center gap-2 px-3 py-4 rounded-xl border-2 border-gray-200 hover:border-gray-300 hover:bg-gray-50 transition-all">
                <div class="w-10 h-10 rounded-xl bg-gray-100 flex items-center justify-center">
                  <svg class="h-5 w-5 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
                </div>
                <span class="text-xs font-medium text-gray-600 text-center leading-tight">SMSF</span>
              </button>

              <!-- Not-for-Profit -->
              <button class="flex flex-col items-center gap-2 px-3 py-4 rounded-xl border-2 border-gray-200 hover:border-gray-300 hover:bg-gray-50 transition-all">
                <div class="w-10 h-10 rounded-xl bg-gray-100 flex items-center justify-center">
                  <svg class="h-5 w-5 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/></svg>
                </div>
                <span class="text-xs font-medium text-gray-600 text-center leading-tight">Not-for-Profit</span>
              </button>

            </div>
          </div>

          <!-- Legal name -->
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1.5">Legal / registered name</label>
            <input type="text" placeholder="If different from workspace name" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm text-gray-500 focus:ring-2 focus:ring-teal-500 focus:border-teal-500 outline-none">
          </div>

          <!-- ABN -->
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1.5">
              ABN — Australian Business Number <span class="text-red-500">*</span>
            </label>
            <div class="relative">
              <input type="text" value="51 824 753 556" class="w-full px-3 py-2 border border-teal-500 rounded-lg text-sm text-gray-900 focus:ring-2 focus:ring-teal-500 outline-none pr-28">
              <div class="absolute right-2 top-1.5 flex items-center gap-1.5 bg-green-50 border border-green-200 text-green-700 rounded-md px-2 py-0.5 text-xs font-medium">
                <svg class="h-3 w-3" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"/></svg>
                Valid ABN
              </div>
            </div>
            <p class="mt-1 text-xs text-green-600 font-medium">✓ Apex Electrical Services Pty Ltd — Active</p>
          </div>

          <!-- Two columns: currency + fiscal year -->
          <div class="grid grid-cols-2 gap-4">
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1.5">Base currency</label>
              <div class="relative">
                <select class="w-full appearance-none px-3 py-2 border border-gray-300 rounded-lg text-sm text-gray-900 bg-white focus:ring-2 focus:ring-teal-500 outline-none pr-8">
                  <option selected>AUD — Australian Dollar</option>
                  <option>USD — US Dollar</option>
                </select>
                <svg class="absolute right-2.5 top-2.5 h-4 w-4 text-gray-400 pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
              </div>
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1.5">Financial year starts</label>
              <div class="relative">
                <select class="w-full appearance-none px-3 py-2 border border-gray-300 rounded-lg text-sm text-gray-900 bg-white focus:ring-2 focus:ring-teal-500 outline-none pr-8">
                  <option selected>July (Australian FY)</option>
                  <option>January</option>
                </select>
                <svg class="absolute right-2.5 top-2.5 h-4 w-4 text-gray-400 pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
              </div>
            </div>
          </div>

        </div>

        <!-- Footer -->
        <div class="flex items-center justify-between px-6 pb-6 pt-4 border-t border-gray-100">
          <button class="text-sm text-gray-400 hover:text-gray-600 transition-colors">Cancel</button>
          <button class="flex items-center gap-2 bg-teal-700 hover:bg-teal-800 text-white text-sm font-semibold px-5 py-2.5 rounded-lg transition-colors">
            Next: About Your Business
            <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
          </button>
        </div>

      </div>
    </div>

    <!-- Background page (blurred) -->
    <header class="bg-white border-b border-gray-200 px-6 py-4 opacity-40">
      <div class="text-xl font-semibold text-gray-900">Dashboard</div>
    </header>
    <div class="flex-1 p-6 opacity-20">
      <div class="grid grid-cols-4 gap-4 mb-6">
        <div class="bg-white rounded-lg border border-gray-200 h-20"></div>
        <div class="bg-white rounded-lg border border-gray-200 h-20"></div>
        <div class="bg-white rounded-lg border border-gray-200 h-20"></div>
        <div class="bg-white rounded-lg border border-gray-200 h-20"></div>
      </div>
    </div>

  </main>

  <script src="viewer-toolbar.js" defer></script>
</body>
</html>
