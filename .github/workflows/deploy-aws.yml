name: "Docs: Deploy Next.js to AWS ECS"

run-name: "🚀 Docs Deploy #${{ github.run_number }} → ECS ${{ github.event.workflow_run.head_branch || inputs.environment || 'Unknown' }} · ${{ github.event.workflow_run.head_sha || inputs.image_tag || github.sha }}"

on:
  # Auto-deploy when Docker image build completes successfully
  workflow_run:
    workflows: ["Docs: Build Next.js Docker Image for ECS"]
    types:
      - completed
    branches:
      - main
  # Manual deployment option
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        type: choice
        options:
          - prod
      image_tag:
        description: 'Docker image tag (commit SHA or "latest")'
        required: false
        default: 'latest'

env:
  AWS_REGION: ap-southeast-2
  DEVOPS_ACCOUNT_ID: '967883357946'
  ECR_REGISTRY: '967883357946.dkr.ecr.ap-southeast-2.amazonaws.com'

jobs:
  determine-environment:
    name: Determine Deployment Environment
    runs-on: ubuntu-latest
    # Only run on successful build or manual trigger
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    outputs:
      environment: ${{ steps.set-env.outputs.environment }}
      branch: ${{ steps.set-env.outputs.branch }}
    steps:
      - name: Determine environment from branch
        id: set-env
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "environment=${{ inputs.environment }}" >> $GITHUB_OUTPUT
            echo "branch=main" >> $GITHUB_OUTPUT
          else
            BRANCH="${{ github.event.workflow_run.head_branch }}"
            echo "branch=$BRANCH" >> $GITHUB_OUTPUT
            if [[ "$BRANCH" == "main" ]]; then
              echo "environment=prod" >> $GITHUB_OUTPUT
            elif [[ "$BRANCH" == "stage" ]]; then
              echo "environment=staging" >> $GITHUB_OUTPUT
            else
              echo "environment=dev" >> $GITHUB_OUTPUT
            fi
          fi

  deploy:
    name: Deploy to ${{ needs.determine-environment.outputs.environment }}
    needs: determine-environment
    runs-on: codebuild-trilogy-care-organisation-build-${{ github.run_id }}-${{ github.run_attempt }}
    timeout-minutes: 45
    environment: ${{ needs.determine-environment.outputs.environment == 'prod' && 'production' || 'staging' }}

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Determine deployment details
        id: deploy-details
        run: |
          ENV="${{ needs.determine-environment.outputs.environment }}"
          BRANCH="${{ needs.determine-environment.outputs.branch }}"

          # Set ECR repository based on branch
          if [[ "$BRANCH" == "main" ]]; then
            echo "ecr_repo=trilogycare/tc-docs-main" >> $GITHUB_OUTPUT
          elif [[ "$BRANCH" == "stage" ]]; then
            echo "ecr_repo=trilogycare/tc-docs-stage" >> $GITHUB_OUTPUT
          else
            echo "ecr_repo=trilogycare/tc-docs-dev" >> $GITHUB_OUTPUT
          fi

          # Set image tag
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "image_tag=${{ inputs.image_tag }}" >> $GITHUB_OUTPUT
          else
            echo "image_tag=${{ github.event.workflow_run.head_sha }}" >> $GITHUB_OUTPUT
          fi

          echo "🚀 Deploying to: $ENV"
          echo "📦 Branch: $BRANCH"
          echo "🏷️  Image tag: ${{ github.event.workflow_run.head_sha || inputs.image_tag }}"

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Verify image exists in ECR
        run: |
          ECR_REPO="${{ steps.deploy-details.outputs.ecr_repo }}"
          IMAGE_TAG="${{ steps.deploy-details.outputs.image_tag }}"

          echo "🔍 Verifying image exists: ${{ env.ECR_REGISTRY }}/$ECR_REPO:$IMAGE_TAG"

          if aws ecr describe-images \
            --registry-id ${{ env.DEVOPS_ACCOUNT_ID }} \
            --repository-name $ECR_REPO \
            --image-ids imageTag=$IMAGE_TAG \
            --region ${{ env.AWS_REGION }} > /dev/null 2>&1; then
            echo "✅ Image found in ECR"
          else
            echo "❌ Image not found in ECR. Build workflow may have failed."
            exit 1
          fi

      - name: Configure AWS credentials for target account
        run: |
          ENV="${{ needs.determine-environment.outputs.environment }}"

          # Determine AWS account based on environment
          if [[ "$ENV" == "prod" ]]; then
            ACCOUNT_ID="075540751014"
            ROLE_NAME="ChatProdDeploymentRole"
            echo "🎯 Deploying to Production (075540751014 - Chat-Prod)"
          else
            echo "❌ Unknown environment: $ENV"
            exit 1
          fi

          echo "🔐 Assuming role: arn:aws:iam::$ACCOUNT_ID:role/$ROLE_NAME"

          CREDENTIALS=$(aws sts assume-role \
            --role-arn arn:aws:iam::$ACCOUNT_ID:role/$ROLE_NAME \
            --role-session-name github-actions-deploy-${{ github.run_id }} \
            --duration-seconds 3600 \
            --query 'Credentials' \
            --output json)

          export AWS_ACCESS_KEY_ID=$(echo $CREDENTIALS | jq -r '.AccessKeyId')
          export AWS_SECRET_ACCESS_KEY=$(echo $CREDENTIALS | jq -r '.SecretAccessKey')
          export AWS_SESSION_TOKEN=$(echo $CREDENTIALS | jq -r '.SessionToken')

          echo "AWS_ACCESS_KEY_ID=$AWS_ACCESS_KEY_ID" >> $GITHUB_ENV
          echo "AWS_SECRET_ACCESS_KEY=$AWS_SECRET_ACCESS_KEY" >> $GITHUB_ENV
          echo "AWS_SESSION_TOKEN=$AWS_SESSION_TOKEN" >> $GITHUB_ENV

          echo "✅ AWS credentials configured for $ENV"

      - name: Get ECS cluster and service names
        id: ecs-resources
        run: |
          ENV="${{ needs.determine-environment.outputs.environment }}"

          echo "cluster=tc-docs-${ENV}-cluster" >> $GITHUB_OUTPUT
          echo "service=tc-docs-${ENV}-service" >> $GITHUB_OUTPUT
          echo "region=ap-southeast-2" >> $GITHUB_OUTPUT

          echo "📋 ECS Cluster: tc-docs-${ENV}-cluster"
          echo "📋 ECS Service: tc-docs-${ENV}-service"

      - name: Download current task definition
        run: |
          CLUSTER="${{ steps.ecs-resources.outputs.cluster }}"
          SERVICE="${{ steps.ecs-resources.outputs.service }}"
          REGION="${{ steps.ecs-resources.outputs.region }}"

          TASK_DEF_ARN=$(aws ecs describe-services \
            --cluster "$CLUSTER" \
            --services "$SERVICE" \
            --region "$REGION" \
            --query 'services[0].taskDefinition' \
            --output text)

          echo "📋 Current task definition: $TASK_DEF_ARN"

          aws ecs describe-task-definition \
            --task-definition "$TASK_DEF_ARN" \
            --region "$REGION" \
            --query 'taskDefinition' \
            --output json > /tmp/task-def.json

      - name: Update task definition with new image
        id: update-task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: /tmp/task-def.json
          container-name: app
          image: ${{ env.ECR_REGISTRY }}/${{ steps.deploy-details.outputs.ecr_repo }}:${{ steps.deploy-details.outputs.image_tag }}

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.update-task-def.outputs.task-definition }}
          service: ${{ steps.ecs-resources.outputs.service }}
          cluster: ${{ steps.ecs-resources.outputs.cluster }}
          wait-for-service-stability: false

      - name: Wait for deployment to complete
        run: |
          echo "⏳ Waiting for service to stabilize (this may take 10-15 minutes)..."
          echo "📊 You can monitor progress in the AWS ECS console"

          # Wait with timeout (40 minutes max)
          timeout 2400 aws ecs wait services-stable \
            --cluster ${{ steps.ecs-resources.outputs.cluster }} \
            --services ${{ steps.ecs-resources.outputs.service }} \
            --region ${{ steps.ecs-resources.outputs.region }} || {

            echo "⚠️ Deployment wait timed out or failed"
            echo "Checking service status..."

            aws ecs describe-services \
              --cluster ${{ steps.ecs-resources.outputs.cluster }} \
              --services ${{ steps.ecs-resources.outputs.service }} \
              --region ${{ steps.ecs-resources.outputs.region }} \
              --query 'services[0].{deployments:deployments,runningCount:runningCount,desiredCount:desiredCount,events:events[0:5]}' \
              --output json

            exit 1
          }

          echo "🎉 Deployment successful!"
          echo "🐳 Image: ${{ env.ECR_REGISTRY }}/${{ steps.deploy-details.outputs.ecr_repo }}:${{ steps.deploy-details.outputs.image_tag }}"
          echo "🌐 Environment: ${{ needs.determine-environment.outputs.environment }}"

      - name: Deployment Summary
        if: success()
        run: |
          ENV="${{ needs.determine-environment.outputs.environment }}"
          ENV_LABEL="Production"
          ACCOUNT_ID="075540751014"

          echo "### 🎉 Deployment Successful" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Environment** | $ENV_LABEL |" >> $GITHUB_STEP_SUMMARY
          echo "| **AWS Account** | $ACCOUNT_ID (Chat-Prod) |" >> $GITHUB_STEP_SUMMARY
          echo "| **Region** | ${{ steps.ecs-resources.outputs.region }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **ECS Cluster** | \`${{ steps.ecs-resources.outputs.cluster }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **ECS Service** | \`${{ steps.ecs-resources.outputs.service }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Docker Image** | \`${{ env.ECR_REGISTRY }}/${{ steps.deploy-details.outputs.ecr_repo }}:${{ steps.deploy-details.outputs.image_tag }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Image Tag** | \`${{ steps.deploy-details.outputs.image_tag }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Branch** | \`${{ needs.determine-environment.outputs.branch }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Service is healthy and serving traffic" >> $GITHUB_STEP_SUMMARY
